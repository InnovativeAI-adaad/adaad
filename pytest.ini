[pytest]
markers =
    qa7: lint scope expansion rollout tests gated behind QA7_LINT_ROLLOUT.
    pr3h_acceptance: PR-3H acceptance suite (checkpoint tamper escalation + entropy triage replay fixtures).
    pr3h_checkpoint_tamper: PR-3H acceptance checkpoint tamper escalation coverage.
    pr3h_entropy_triage: PR-3H acceptance entropy triage replay fixture coverage.
    autonomous_critical: primary lane marker for deterministic autonomy/replay/integration critical tests.
    governance_gate: primary lane marker for governance and constitutional gate tests.
    regression_standard: primary lane marker for baseline regression tests.
    dev_only: primary lane marker for developer-focused acceptance and fixture tests.
