<!-- Row 1 -->
<g class="r1"><rect x="3" y="38" width="1437" height="30" fill="#0a1828" opacity="0.7"/>
<text x="30" y="58" fill="#4a7a9a" font-size="10">Mutation model</text>
<text x="655" y="58" fill="#2a4a5a" font-size="10" text-anchor="middle">Suggest → human applies</text>
<circle cx="920" cy="53" r="10" fill="url(#cmp-check-glow)"/>
