<svg viewBox="0 0 1440 340" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New',monospace">
<defs>
  <linearGradient id="cmp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#010810"/>
    <stop offset="100%" stop-color="#020d1c"/>
  </linearGradient>
  <linearGradient id="cmp-left" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
  </linearGradient>
  <radialGradient id="cmp-check-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </radialGradient>
  <filter id="cmp-glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="cmp-glow-sm"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="cmp-dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.7" fill="#00d4ff" opacity="0.07"/>
  </pattern>
  <style>
    @keyframes cmp-fade{0%{opacity:0;transform:translateX(-4px)}100%{opacity:1;transform:translateX(0)}}
    @keyframes cmp-pulse{0%,100%{opacity:.7}50%{opacity:1}}
    .r1{animation:cmp-fade .4s ease-out .1s both}
    .r2{animation:cmp-fade .4s ease-out .2s both}
    .r3{animation:cmp-fade .4s ease-out .3s both}
    .r4{animation:cmp-fade .4s ease-out .4s both}
    .r5{animation:cmp-fade .4s ease-out .5s both}
    .r6{animation:cmp-fade .4s ease-out .6s both}
    .r7{animation:cmp-fade .4s ease-out .7s both}
    .r8{animation:cmp-fade .4s ease-out .8s both}
    .r9{animation:cmp-fade .4s ease-out .9s both}
    .r10{animation:cmp-fade .4s ease-out 1.0s both}
    .cmp-hdr{animation:cmp-pulse 3s ease-in-out infinite}
  </style>
</defs>
<rect width="1440" height="340" fill="url(#cmp-bg)"/>
<rect width="1440" height="340" fill="url(#cmp-dots)"/>
<rect x="0" y="0" width="3" height="340" fill="url(#cmp-left)"/>
<rect x="0" y="0" width="1440" height="1.5" fill="#00d4ff" opacity="0.3"/>
<rect x="0" y="338.5" width="1440" height="1.5" fill="#00d4ff" opacity="0.15"/>

<!-- Column dividers -->
<line x1="440" y1="0" x2="440" y2="340" stroke="#0d2035" stroke-width="1"/>
<line x1="870" y1="0" x2="870" y2="340" stroke="#0d2035" stroke-width="1"/>
<line x1="871" y1="0" x2="871" y2="340" stroke="#001a10" stroke-width="0.5" opacity="0.5"/>

<!-- Header row -->
<rect x="0" y="0" width="1440" height="38" fill="#020f1e"/>
<rect x="0" y="37.5" width="1440" height="0.5" fill="#00d4ff" opacity="0.4"/>
<text x="220" y="24" fill="#2a4a6a" font-size="11" letter-spacing="3" text-anchor="middle" font-weight="700">CAPABILITY</text>
<text x="655" y="24" fill="#3a5a7a" font-size="11" letter-spacing="2" text-anchor="middle" font-weight="700">COPILOT / CURSOR  ·  DEVIN</text>
<text x="1155" y="24" fill="#00d4ff" font-size="12" letter-spacing="3" text-anchor="middle" font-weight="700" filter="url(#cmp-glow)" class="cmp-hdr">ADAAD</text>
<text x="1141" y="24" fill="#00d4ff" font-size="12" letter-spacing="3" text-anchor="middle" font-weight="700" opacity="0.15">ADAAD</text>

