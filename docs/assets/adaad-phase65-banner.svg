<!-- ════ BOTTOM PROOF STRIP ════ -->
<line x1="44" y1="440" x2="1156" y2="440" stroke="#00d4ff" stroke-width="0.5" opacity="0.18"/>
<g text-anchor="middle" font-family="'Courier New',monospace">
