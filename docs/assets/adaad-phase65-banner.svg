<svg viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes scan { 0%{transform:translateY(-200px)} 100%{transform:translateY(760px)} }
    @keyframes breathe { 0%,100%{opacity:.08} 50%{opacity:.22} }
    @keyframes beacon { 0%,100%{r:6;opacity:1} 50%{r:10;opacity:.4} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
    @keyframes shimmer { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-50} }
  </style>

  <pattern id="dots3" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="13" cy="13" r="1.05" fill="#00d4ff" opacity="0.19"/>
  </pattern>
  <pattern id="grid3" width="65" height="65" patternUnits="userSpaceOnUse">
    <path d="M65 0L0 0 0 65" fill="none" stroke="#00d4ff" stroke-width="0.28" opacity="0.1"/>
  </pattern>

  <filter id="gs3">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gm3">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gxl3">
    <feGaussianBlur stdDeviation="22" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#010205"/>
    <stop offset="35%" stop-color="#020b18"/>
    <stop offset="68%" stop-color="#020912"/>
    <stop offset="100%" stop-color="#010205"/>
  </linearGradient>
  <radialGradient id="leftbloom" cx="18%" cy="48%" r="40%">
    <stop offset="0%" stop-color="#080400" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#010205" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rightbloom" cx="82%" cy="48%" r="40%">
    <stop offset="0%" stop-color="#000a14" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#010205" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="centerbloom" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.07">
      <animate attributeName="stop-opacity" values="0.07;0.14;0.07" dur="6s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="cyang3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#005575"/>
    <stop offset="40%" stop-color="#00e8ff"/>
    <stop offset="60%" stop-color="#00e8ff"/>
    <stop offset="100%" stop-color="#005575"/>
  </linearGradient>
  <linearGradient id="goldg3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4a3000"/>
    <stop offset="40%" stop-color="#f5c842"/>
    <stop offset="60%" stop-color="#f5c842"/>
    <stop offset="100%" stop-color="#4a3000"/>
  </linearGradient>
  <linearGradient id="titleg3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="42%" stop-color="#00eeff"/>
    <stop offset="58%" stop-color="#f5c842"/>
    <stop offset="100%" stop-color="#d49020"/>
  </linearGradient>
  <linearGradient id="scanfade3" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.045"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="vlr3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010205" stop-opacity="0.9"/>
    <stop offset="10%" stop-color="#010205" stop-opacity="0"/>
    <stop offset="90%" stop-color="#010205" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010205" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="vtb3" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#010205" stop-opacity="0.68"/>
    <stop offset="13%" stop-color="#010205" stop-opacity="0"/>
    <stop offset="87%" stop-color="#010205" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010205" stop-opacity="0.75"/>
  </linearGradient>

  <clipPath id="clip3">
    <rect width="1400" height="560"/>
  </clipPath>
