<rect width="1400" height="560" fill="url(#leftbloom)"/>
<rect width="1400" height="560" fill="url(#rightbloom)"/>
<rect width="1400" height="560" fill="url(#centerbloom)"/>

<g clip-path="url(#clip3)">
