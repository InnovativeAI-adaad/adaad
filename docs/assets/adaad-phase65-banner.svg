  <text x="700" y="230" font-family="'Courier New',monospace" font-size="10.5" fill="#2a5060" letter-spacing="1.5">Zero human intervention in the execution path. Full human oversight of the constitutional framework.</text>
  <text x="700" y="246" font-family="'Courier New',monospace" font-size="10.5" fill="#2a5060" letter-spacing="1.5">Every step cryptographically evidenced and deterministically replayable.</text>
</g>

