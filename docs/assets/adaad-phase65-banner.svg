  <text x="8" y="24" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
  <text x="26" y="26" fill="#f5c842" font-size="7.5" letter-spacing="0.5">07_GOVERNANCE_GATE_V2</text>
  <text x="26" y="36" fill="#3a6070" font-size="7">GovernanceGateV2 → APPROVED (Class A — no exception token required)</text>

