<!-- Constitutional invariants enforced line -->
<text x="600" y="472" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#2a4858" letter-spacing="2.5">MUTATION-TARGET  ·  AUDIT-0  ·  REPLAY-0  ·  CEL-ORDER-0  ·  CEL-EVIDENCE-0  ·  SANDBOX-DIV-0  ·  GATE-V2-EXISTING-0</text>

