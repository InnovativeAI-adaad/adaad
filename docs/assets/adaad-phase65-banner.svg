    <text x="26" y="82" fill="#00d4ff" font-size="7.5" letter-spacing="0.5">03_PROPOSAL_GENERATE</text>
    <text x="26" y="92" fill="#3a6070" font-size="7" letter-spacing="0.5">ProposalEngine → AST-level mutation — proposal_hash recorded</text>

    <!-- Step 04 -->
    <circle cx="8" cy="114" r="4.5" fill="#00ff88" opacity="0.9" filter="url(#glow-s)"/>
    <text x="8" y="108" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
    <text x="26" y="110" fill="#00d4ff" font-size="7.5" letter-spacing="0.5">04_STATIC_SCAN</text>
    <text x="26" y="120" fill="#3a6070" font-size="7" letter-spacing="0.5">StaticSafetyScanner → all 4 AST safety rules PASS</text>

    <!-- Step 05 -->
    <circle cx="8" cy="142" r="4.5" fill="#00ff88" opacity="0.9" filter="url(#glow-s)"/>
    <text x="8" y="136" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
    <text x="26" y="138" fill="#00d4ff" font-size="7.5" letter-spacing="0.5">05_SANDBOX_TOURNAMENT</text>
    <text x="26" y="148" fill="#3a6070" font-size="7" letter-spacing="0.5">SandboxTournament → top candidate recorded in ephemeral container</text>

    <!-- Step 06 -->
    <circle cx="8" cy="170" r="4.5" fill="#00ff88" opacity="0.9" filter="url(#glow-s)"/>
    <text x="8" y="164" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
    <text x="26" y="166" fill="#f5c842" font-size="7.5" letter-spacing="0.5">06_FITNESS_SCORE</text>
    <text x="26" y="176" fill="#3a6070" font-size="7" letter-spacing="0.5">FitnessEngineV2 → 7/7 signals above baseline — composite PASS</text>
  </g>
</g>

<!-- Vertical divider between panels -->
<line x1="640" y1="240" x2="640" y2="470" stroke="#1a2a3a" stroke-width="0.5"/>

<g transform="translate(656, 252)" font-family="'Courier New',monospace">
  <text x="0" y="0" fill="#f5c842" font-size="8" letter-spacing="3" opacity="0.7">GOVERNANCE OUTCOME</text>
  <line x1="0" y1="8" x2="498" y2="8" stroke="#f5c842" stroke-width="0.5" opacity="0.18"/>

  <line x1="8" y1="22" x2="8" y2="182" stroke="#f5c842" stroke-width="1" opacity="0.15"/>

  <!-- Step 07 - gate v2 APPROVED -->
