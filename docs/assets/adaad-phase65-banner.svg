  <text x="8" y="52" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
  <text x="26" y="54" fill="#f5c842" font-size="7.5" letter-spacing="0.5">08_GOVERNANCE_GATE</text>
  <text x="26" y="64" fill="#3a6070" font-size="7">GovernanceGate → CONFIRMED — all 23 constitutional rules pass</text>

  <!-- Step 09 - patch -->
  <circle cx="8" cy="86" r="4.5" fill="#00ff88" opacity="0.9" filter="url(#glow-s)"/>
  <text x="8" y="80" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
  <text x="26" y="82" fill="#00d4ff" font-size="7.5" letter-spacing="0.5">09_PATCH_APPLY</text>
  <text x="26" y="92" fill="#3a6070" font-size="7">ASTDiffPatch applied atomically — replay_verifier: 0 divergences</text>

  <!-- Step 10 - capability -->
  <circle cx="8" cy="114" r="4.5" fill="#00ff88" opacity="0.9" filter="url(#glow-s)"/>
  <text x="8" y="108" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
  <text x="26" y="110" fill="#00d4ff" font-size="7.5" letter-spacing="0.5">10_CAPABILITY_UPDATE</text>
  <text x="26" y="120" fill="#3a6070" font-size="7">CapabilityGraph → target version bumped, CapabilityChange written to ledger</text>

  <!-- Step 11 - evidence -->
  <circle cx="8" cy="142" r="4.5" fill="#00ff88" opacity="0.9" filter="url(#glow-s)"/>
  <text x="8" y="136" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
  <text x="26" y="138" fill="#00d4ff" font-size="7.5" letter-spacing="0.5">11_EPOCH_EVIDENCE</text>
  <text x="26" y="148" fill="#3a6070" font-size="7">EpochEvidence → SHA-256 hash-chained into evolution ledger</text>

