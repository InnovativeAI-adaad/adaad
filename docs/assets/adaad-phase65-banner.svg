<svg viewBox="0 0 1440 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="p65-bg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#010810"/>
    <stop offset="30%"  stop-color="#001a0a"/>
    <stop offset="70%"  stop-color="#001a0a"/>
    <stop offset="100%" stop-color="#010810"/>
  </linearGradient>
  <radialGradient id="p65-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00ff88" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </radialGradient>
  <filter id="p65-blur"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="p65-soft"><feGaussianBlur stdDeviation="25"/></filter>
  <pattern id="p65-dots" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.7" fill="#00ff88" opacity="0.09"/>
  </pattern>
  <pattern id="p65-grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M60 0L0 0 0 60" fill="none" stroke="#00ff88" stroke-width="0.2" opacity="0.07"/>
  </pattern>
  <style>
    @keyframes p65-chain{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-60}}
    @keyframes p65-beacon{0%,100%{r:6;opacity:.9}50%{r:10;opacity:.4}}
    @keyframes p65-pulse{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes p65-scan{0%{transform:translateY(-80px)}100%{transform:translateY(280px)}}
    .p65-chain{stroke-dasharray:15 8;animation:p65-chain 3s linear infinite}
    .p65-beacon{animation:p65-beacon 2.5s ease-in-out infinite}
    .p65-pulse{animation:p65-pulse 2.5s ease-in-out infinite}
    .p65-scan{animation:p65-scan 5s linear infinite}
  </style>
</defs>
<rect width="1440" height="200" fill="url(#p65-bg)"/>
<rect width="1440" height="200" fill="url(#p65-glow)"/>
<rect width="1440" height="200" fill="url(#p65-dots)"/>
<rect width="1440" height="200" fill="url(#p65-grid)"/>
<!-- Deep glow centre -->
<circle cx="720" cy="100" r="250" fill="#00ff88" opacity="0.05" filter="url(#p65-soft)"/>
<!-- Scanning line -->
<rect x="0" y="0" width="1440" height="1.5" fill="#00ff88" opacity="0.15" class="p65-scan"/>
<!-- Top / bottom border -->
<rect x="0" y="0" width="1440" height="1.8" fill="#00ff88" opacity="0.5"/>
<rect x="0" y="198.2" width="1440" height="1.8" fill="#f5c842" opacity="0.4"/>
<!-- Hash chain left -->
<g transform="translate(40,82)">
  <rect x="0" y="0" width="90" height="36" rx="4" fill="#001e10" stroke="#00ff88" stroke-width="1.2" opacity="0.7"/>
  <text x="45" y="14" text-anchor="middle" font-family="'Courier New',monospace" font-size="6.5" fill="#00ff88" opacity="0.8">EPOCH 64</text>
  <text x="45" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="#004a18" opacity="0.9">SHA: 9e2b14…</text>
  <line x1="90" y1="18" x2="118" y2="18" stroke="#00ff88" stroke-width="1.5" opacity="0.6" class="p65-chain"/>
  <polygon points="114,14 124,18 114,22" fill="#00ff88" opacity="0.6"/>
  <rect x="124" y="0" width="90" height="36" rx="4" fill="#001e10" stroke="#00ff88" stroke-width="1.2" opacity="0.7"/>
  <text x="169" y="14" text-anchor="middle" font-family="'Courier New',monospace" font-size="6.5" fill="#00ff88" opacity="0.8">EPOCH 65</text>
  <text x="169" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="#f5c842" opacity="0.9">SHA: e1b8a3…</text>
  <line x1="214" y1="18" x2="242" y2="18" stroke="#f5c842" stroke-width="1.5" opacity="0.6" class="p65-chain"/>
  <polygon points="238,14 248,18 238,22" fill="#f5c842" opacity="0.6"/>
  <rect x="248" y="-4" width="90" height="44" rx="5" fill="#001e10" stroke="#f5c842" stroke-width="2" opacity="0.95" filter="url(#p65-blur)"/>
  <text x="293" y="13" text-anchor="middle" font-family="'Courier New',monospace" font-size="6.5" fill="#f5c842" opacity="0.95">⛓ SEALED</text>
  <text x="293" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="#f5c842" opacity="0.9">AUTONOMOUS</text>
  <circle cx="410" cy="18" r="6" fill="#f5c842" opacity="0.9" class="p65-beacon" filter="url(#p65-blur)"/>
</g>
<!-- Main text block centre -->
<text x="720" y="60" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#00ff88" letter-spacing="4" opacity="0.7">PHASE 65 · MARCH 13, 2026</text>
<text x="720" y="100" text-anchor="middle" font-family="'Courier New',monospace" font-size="32" font-weight="900" fill="#00ff88" letter-spacing="6" opacity="0.95" filter="url(#p65-blur)">FIRST AUTONOMOUS SELF-EVOLUTION</text>
<text x="720" y="135" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#f5c842" letter-spacing="2" opacity="0.8">Zero human intervention in the execution path · Full human oversight of the constitutional framework</text>
<text x="720" y="157" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#00d4ff" letter-spacing="2" opacity="0.65">All 23 constitutional rules passed · replay_verifier: 0 divergences · hash in the ledger</text>
<!-- Right side proof block -->
<g transform="translate(1080,65)">
  <rect x="0" y="0" width="310" height="75" rx="6" fill="#001810" stroke="#00ff88" stroke-width="1" opacity="0.75"/>
  <text x="155" y="18" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#00ff88" opacity="0.9" letter-spacing="2">PROOF</text>
  <line x1="20" y1="24" x2="290" y2="24" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>
  <text x="25" y="37" font-family="'Courier New',monospace" font-size="7" fill="#004a18" opacity="0.9">replay_divergences</text>
  <text x="250" y="37" text-anchor="end" font-family="'Courier New',monospace" font-size="7" fill="#00ff88" opacity="0.95">0</text>
  <text x="25" y="50" font-family="'Courier New',monospace" font-size="7" fill="#004a18" opacity="0.9">governance_bypasses</text>
  <text x="250" y="50" text-anchor="end" font-family="'Courier New',monospace" font-size="7" fill="#00ff88" opacity="0.95">0</text>
  <text x="25" y="63" font-family="'Courier New',monospace" font-size="7" fill="#004a18" opacity="0.9">silent_failures</text>
  <text x="250" y="63" text-anchor="end" font-family="'Courier New',monospace" font-size="7" fill="#00ff88" opacity="0.95">0</text>
</g>
<!-- Beacon dots on chain line right side -->
<circle cx="1040" cy="100" r="4" fill="#00ff88" opacity="0.7" class="p65-pulse" filter="url(#p65-blur)"/>
<circle cx="1060" cy="100" r="3" fill="#f5c842" opacity="0.6" class="p65-pulse" filter="url(#p65-blur)"/>
</svg>
