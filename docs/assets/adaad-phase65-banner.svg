  <text x="700" y="188" font-family="'Courier New',monospace" font-size="15.5" fill="#5aaccc" letter-spacing="5">FIRST AUTONOMOUS SELF-EVOLUTION</text>
  <line x1="840" y1="168" x2="1160" y2="168" stroke="#f5c842" stroke-width="0.6" opacity="0.28"/>

  <!-- Descriptions -->
