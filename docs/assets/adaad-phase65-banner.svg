    <text x="8" y="52" fill="#00ff88" font-size="8" text-anchor="middle">✓</text>
    <text x="26" y="54" fill="#00d4ff" font-size="7.5" letter-spacing="0.5">02_CAPABILITY_MAP</text>
    <text x="26" y="64" fill="#3a6070" font-size="7" letter-spacing="0.5">CapabilityDiscovery → cap:runtime.evolution.cel_wiring.live_mode</text>

    <!-- Step 03 -->
    <circle cx="8" cy="86" r="4.5" fill="#00ff88" opacity="0.9" filter="url(#glow-s)"/>
