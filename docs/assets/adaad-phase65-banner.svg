  <rect x="208" y="448" width="164" height="20" rx="2" fill="#0a0810" stroke="#f5c842" stroke-width="0.6" stroke-opacity="0.7"/>
  <text x="290" y="462" fill="#f5c842" font-size="7" letter-spacing="1.5">GOV BYPASSES : 0</text>

  <rect x="382" y="448" width="174" height="20" rx="2" fill="#0a0810" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.7"/>
  <text x="469" y="462" fill="#00d4ff" font-size="7" letter-spacing="1.5">RETROACTIVE : FALSE</text>

  <rect x="566" y="448" width="156" height="20" rx="2" fill="#0a0810" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.7"/>
  <text x="644" y="462" fill="#00ff88" font-size="7" letter-spacing="1.5">SILENT FAIL : 0</text>

  <rect x="732" y="448" width="200" height="20" rx="2" fill="#0a0810" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="832" y="462" fill="#4a7a99" font-size="7" letter-spacing="1.5">SHA-256 HASH-CHAINED</text>

  <rect x="942" y="448" width="210" height="20" rx="2" fill="#0a0810" stroke="#f5c842" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="1047" y="462" fill="#6a5020" font-size="7" letter-spacing="1.5">artifacts/governance/phase65/</text>
