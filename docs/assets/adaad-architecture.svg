<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c18"/>
      <stop offset="100%" style="stop-color:#0a1428"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff" opacity="0.7"/>
    </marker>
    <marker id="arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f5c842" opacity="0.7"/>
    </marker>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" fill="url(#bg2)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/><line x1="450" y1="0" x2="450" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/><line x1="700" y1="0" x2="700" y2="420"/>
    <line x1="800" y1="0" x2="800" y2="420"/>
  </g>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#00d4ff" font-size="11" letter-spacing="4" opacity="0.8">ADAAD SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="34" x2="700" y2="34" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>

  <!-- === ROW 1: Input agents === -->
  <!-- Architect Agent -->
  <g transform="translate(40, 55)">
    <rect width="120" height="56" rx="4" fill="#0d1f3a" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <text x="60" y="18" text-anchor="middle" fill="#00d4ff" font-size="8" letter-spacing="1">ARCHITECT</text>
    <text x="60" y="30" text-anchor="middle" fill="#7a9ab5" font-size="7">Methodical</text>
    <text x="60" y="42" text-anchor="middle" fill="#7a9ab5" font-size="7">Conservative</text>
    <text x="60" y="52" text-anchor="middle" fill="#00d4ff" font-size="7" opacity="0.6">Claude API</text>
  </g>

  <!-- Dream Agent -->
  <g transform="translate(180, 55)">
    <rect width="120" height="56" rx="4" fill="#0d1f3a" stroke="#9966ff" stroke-width="1" opacity="0.8"/>
    <text x="60" y="18" text-anchor="middle" fill="#9966ff" font-size="8" letter-spacing="1">DREAM</text>
    <text x="60" y="30" text-anchor="middle" fill="#7a9ab5" font-size="7">Creative</text>
    <text x="60" y="42" text-anchor="middle" fill="#7a9ab5" font-size="7">Exploratory</text>
    <text x="60" y="52" text-anchor="middle" fill="#9966ff" font-size="7" opacity="0.6">Claude API</text>
  </g>

  <!-- Beast Agent -->
  <g transform="translate(320, 55)">
    <rect width="120" height="56" rx="4" fill="#0d1f3a" stroke="#ff4466" stroke-width="1" opacity="0.8"/>
    <text x="60" y="18" text-anchor="middle" fill="#ff4466" font-size="8" letter-spacing="1">BEAST</text>
    <text x="60" y="30" text-anchor="middle" fill="#7a9ab5" font-size="7">Aggressive</text>
    <text x="60" y="42" text-anchor="middle" fill="#7a9ab5" font-size="7">Max throughput</text>
    <text x="60" y="52" text-anchor="middle" fill="#ff4466" font-size="7" opacity="0.6">Claude API</text>
  </g>

  <!-- Arrows down from agents to bandit selector -->
  <line x1="100" y1="111" x2="100" y2="148" stroke="#00d4ff" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="111" x2="240" y2="148" stroke="#9966ff" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="111" x2="380" y2="148" stroke="#ff4466" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Bandit Selector -->
  <g transform="translate(120, 150)">
    <rect width="340" height="50" rx="4" fill="#0f2040" stroke="#f5c842" stroke-width="1.5"/>
    <text x="170" y="17" text-anchor="middle" fill="#f5c842" font-size="9" letter-spacing="2">BANDIT SELECTOR</text>
    <text x="170" y="30" text-anchor="middle" fill="#7a9ab5" font-size="7.5">UCB1 + Thompson Sampling · BLX-alpha crossover · Up to 12 candidates/epoch</text>
    <text x="170" y="42" text-anchor="middle" fill="#f5c842" font-size="7" opacity="0.7">NonStationarityDetector (Page-Hinkley) · MD5 dedup</text>
  </g>

  <!-- Arrow right from bandit to governance gate -->
  <line x1="460" y1="175" x2="530" y2="175" stroke="#f5c842" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow-gold)"/>

  <!-- === CENTER: Governance Gate (the hero) === -->
  <g transform="translate(530, 55)">
    <rect width="220" height="260" rx="6" fill="#0a1a2e" stroke="#00d4ff" stroke-width="2"/>
    <!-- Inner glow -->
    <rect x="4" y="4" width="212" height="252" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

    <text x="110" y="22" text-anchor="middle" fill="#00d4ff" font-size="10" letter-spacing="3" filter="url(#glow2)">GOVERNANCE GATE</text>
    <text x="110" y="36" text-anchor="middle" fill="#ff4466" font-size="7.5" letter-spacing="2">SOLE APPROVAL SURFACE</text>
    <line x1="10" y1="42" x2="210" y2="42" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>

    <!-- 14-step flow condensed -->
    <g transform="translate(14, 52)" font-size="7.5">
      <!-- Steps as flow boxes -->
      <g>
        <rect width="192" height="14" rx="2" fill="#00d4ff" opacity="0.08"/>
        <text x="96" y="10" text-anchor="middle" fill="#00d4ff" opacity="0.9">1 · DRIFT CHECK → 2 · LINEAGE SNAP</text>
      </g>
      <line x1="96" y1="14" x2="96" y2="20" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrow)"/>
      <g transform="translate(0, 20)">
        <rect width="192" height="14" rx="2" fill="#00d4ff" opacity="0.08"/>
        <text x="96" y="10" text-anchor="middle" fill="#00d4ff" opacity="0.9">3 · FITNESS BASE → 4 · PROPOSAL GEN</text>
      </g>
      <line x1="96" y1="34" x2="96" y2="40" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrow)"/>
      <g transform="translate(0, 40)">
        <rect width="192" height="14" rx="2" fill="#f5c842" opacity="0.08"/>
        <text x="96" y="10" text-anchor="middle" fill="#f5c842" opacity="0.9">5 · AST SCAN → 6 · SANDBOX EXEC</text>
      </g>
      <line x1="96" y1="54" x2="96" y2="60" stroke="#f5c842" stroke-width="0.8" opacity="0.4" marker-end="url(#arrow-gold)"/>
      <g transform="translate(0, 60)">
        <rect width="192" height="14" rx="2" fill="#ff4466" opacity="0.08"/>
        <text x="96" y="10" text-anchor="middle" fill="#ff4466" opacity="0.9">7 · REPLAY VERIFY (SANDBOX-DIV-0)</text>
      </g>
      <line x1="96" y1="74" x2="96" y2="80" stroke="#ff4466" stroke-width="0.8" opacity="0.4" marker-end="url(#arrow)"/>
      <g transform="translate(0, 80)">
        <rect width="192" height="14" rx="2" fill="#00d4ff" opacity="0.08"/>
        <text x="96" y="10" text-anchor="middle" fill="#00d4ff" opacity="0.9">8 · FITNESS SCORE (7 signals)</text>
      </g>
      <line x1="96" y1="94" x2="96" y2="100" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrow)"/>
      <g transform="translate(0, 100)">
        <rect width="192" height="14" rx="2" fill="#ff4466" opacity="0.12"/>
        <text x="96" y="10" text-anchor="middle" fill="#ff4466" opacity="0.95">9 · GATE V2 · 10 · GATE BASE (18+5)</text>
      </g>
      <line x1="96" y1="114" x2="96" y2="120" stroke="#ff4466" stroke-width="0.8" opacity="0.4" marker-end="url(#arrow)"/>
      <g transform="translate(0, 120)">
        <rect width="192" height="14" rx="2" fill="#00d4ff" opacity="0.08"/>
        <text x="96" y="10" text-anchor="middle" fill="#00d4ff" opacity="0.9">11 · LINEAGE REG → 12 · PROMOTION</text>
      </g>
      <line x1="96" y1="134" x2="96" y2="140" stroke="#00d4ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrow)"/>
      <g transform="translate(0, 140)">
        <rect width="192" height="14" rx="2" fill="#00ff88" opacity="0.08"/>
        <text x="96" y="10" text-anchor="middle" fill="#00ff88" opacity="0.9">13 · EVIDENCE → 14 · STATE ADVANCE</text>
      </g>
    </g>

    <!-- Non-bypassable label -->
    <line x1="10" y1="210" x2="210" y2="210" stroke="#ff4466" stroke-width="0.5" opacity="0.3"/>
    <text x="110" y="222" text-anchor="middle" fill="#ff4466" font-size="7" letter-spacing="1">GOV-SOLE-0: NON-BYPASSABLE</text>
    <text x="110" y="234" text-anchor="middle" fill="#7a9ab5" font-size="7">All 23 rules evaluated · Fail-closed</text>
    <text x="110" y="246" text-anchor="middle" fill="#00ff88" font-size="7">DET-ALL-0: Deterministic · Replayable</text>
    <text x="110" y="258" text-anchor="middle" fill="#7a9ab5" font-size="7">CEL-ORDER-0: Strict sequence · No skip</text>
  </g>

  <!-- Arrow right from gate to ledger -->
  <line x1="750" y1="175" x2="800" y2="175" stroke="#00ff88" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- === RIGHT: Hash-Chained Ledger === -->
  <g transform="translate(800, 100)">
    <rect width="88" height="220" rx="4" fill="#0a1a1a" stroke="#00ff88" stroke-width="1.5"/>
    <text x="44" y="16" text-anchor="middle" fill="#00ff88" font-size="7" letter-spacing="1">SHA-256</text>
    <text x="44" y="26" text-anchor="middle" fill="#00ff88" font-size="7" letter-spacing="1">LEDGER</text>
    <line x1="8" y1="30" x2="80" y2="30" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>

    <!-- Ledger entries -->
    <g transform="translate(8, 38)">
      <g>
        <rect width="72" height="22" rx="2" fill="#00ff88" opacity="0.08"/>
        <text x="36" y="9" text-anchor="middle" fill="#00ff88" font-size="6">epoch_001</text>
        <text x="36" y="18" text-anchor="middle" fill="#7a9ab5" font-size="5.5">hash: a3f7...</text>
      </g>
      <line x1="36" y1="22" x2="36" y2="28" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
      <g transform="translate(0, 28)">
        <rect width="72" height="22" rx="2" fill="#00ff88" opacity="0.08"/>
        <text x="36" y="9" text-anchor="middle" fill="#00ff88" font-size="6">epoch_002</text>
        <text x="36" y="18" text-anchor="middle" fill="#7a9ab5" font-size="5.5">prev: a3f7...</text>
      </g>
      <line x1="36" y1="50" x2="36" y2="56" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
      <g transform="translate(0, 56)">
        <rect width="72" height="22" rx="2" fill="#00ff88" opacity="0.08"/>
        <text x="36" y="9" text-anchor="middle" fill="#00ff88" font-size="6">epoch_003</text>
        <text x="36" y="18" text-anchor="middle" fill="#7a9ab5" font-size="5.5">prev: b9c2...</text>
      </g>
      <line x1="36" y1="78" x2="36" y2="84" stroke="#00ff88" stroke-width="0.8" opacity="0.5" stroke-dasharray="2,2"/>
      <text x="36" y="96" text-anchor="middle" fill="#7a9ab5" font-size="8">···</text>
      <line x1="36" y1="100" x2="36" y2="106" stroke="#00ff88" stroke-width="0.8" opacity="0.5" stroke-dasharray="2,2"/>
      <g transform="translate(0, 108)">
        <rect width="72" height="22" rx="2" fill="#00ff88" opacity="0.15"/>
        <text x="36" y="9" text-anchor="middle" fill="#00ff88" font-size="6" font-weight="bold">epoch_N</text>
        <text x="36" y="18" text-anchor="middle" fill="#00ff88" font-size="5.5">LATEST</text>
      </g>
    </g>

    <text x="44" y="210" text-anchor="middle" fill="#7a9ab5" font-size="6">Append-only</text>
    <text x="44" y="219" text-anchor="middle" fill="#7a9ab5" font-size="6">Tamper-evident</text>
  </g>

  <!-- === BOTTOM ROW: Output tier === -->
  <!-- Android -->
  <g transform="translate(40, 340)">
    <rect width="120" height="52" rx="4" fill="#0d1f3a" stroke="#9966ff" stroke-width="1"/>
    <text x="60" y="16" text-anchor="middle" fill="#9966ff" font-size="8" letter-spacing="1">ANDROID</text>
    <text x="60" y="28" text-anchor="middle" fill="#7a9ab5" font-size="7">Termux / Pydroid3</text>
    <text x="60" y="40" text-anchor="middle" fill="#9966ff" font-size="7">$200 phone</text>
  </g>

  <!-- Aponi Dashboard -->
  <g transform="translate(190, 340)">
    <rect width="140" height="52" rx="4" fill="#0d1f3a" stroke="#00d4ff" stroke-width="1"/>
    <text x="70" y="16" text-anchor="middle" fill="#00d4ff" font-size="8" letter-spacing="1">APONI DASHBOARD</text>
    <text x="70" y="28" text-anchor="middle" fill="#7a9ab5" font-size="7">Live governance UI</text>
    <text x="70" y="40" text-anchor="middle" fill="#7a9ab5" font-size="7">FastAPI · WebSocket</text>
  </g>

  <!-- MCP -->
  <g transform="translate(360, 340)">
    <rect width="120" height="52" rx="4" fill="#0d1f3a" stroke="#f5c842" stroke-width="1"/>
    <text x="60" y="16" text-anchor="middle" fill="#f5c842" font-size="8" letter-spacing="1">MCP TOOLS</text>
    <text x="60" y="28" text-anchor="middle" fill="#7a9ab5" font-size="7">5 observability</text>
    <text x="60" y="40" text-anchor="middle" fill="#7a9ab5" font-size="7">endpoints (read-only)</text>
  </g>

  <!-- Connecting lines up to gate -->
  <line x1="100" y1="340" x2="100" y2="315" stroke="#9966ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="260" y1="340" x2="640" y2="320" stroke="#00d4ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="420" y1="340" x2="640" y2="310" stroke="#f5c842" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Corner marks -->
  <g opacity="0.25" stroke="#00d4ff" stroke-width="1.5">
    <line x1="0" y1="0" x2="18" y2="0"/><line x1="0" y1="0" x2="0" y2="18"/>
    <line x1="900" y1="0" x2="882" y2="0"/><line x1="900" y1="0" x2="900" y2="18"/>
    <line x1="0" y1="420" x2="18" y2="420"/><line x1="0" y1="420" x2="0" y2="402"/>
    <line x1="900" y1="420" x2="882" y2="420"/><line x1="900" y1="420" x2="900" y2="402"/>
  </g>
</svg>
