  <text x="903" y="88" class="t-num" fill="#22c55e" text-anchor="middle" style="font-size:8px;font-weight:900">65</text>
  <text x="903" y="97" class="t-sub" text-anchor="middle" style="fill:#22c55e;font-weight:700">SELF-EVOLVED ⛓</text>
  <text x="903" y="106" class="t-sub" text-anchor="middle" style="fill:#22c55e">Mar 13 2026</text>

  <!-- Phase 70 -->
  <circle cx="971" cy="70" r="3.5" fill="#16181d" stroke="#f97316" stroke-width="1"/>
  <text x="971" y="90" class="t-num" fill="#f97316" text-anchor="middle">70</text>
  <text x="971" y="99" class="t-sub" text-anchor="middle">Innovations</text>

  <!-- Phase 77 -->
  <circle cx="1065" cy="70" r="3.5" fill="#16181d" stroke="#f97316" stroke-width="1"/>
  <text x="1065" y="90" class="t-num" fill="#f97316" text-anchor="middle">77</text>
