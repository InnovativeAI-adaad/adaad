  <g class="crown">
    <circle cx="903" cy="70" r="14" fill="#22c55e" opacity=".08"/>
    <circle cx="903" cy="70" r="10" fill="#22c55e" opacity=".12"/>
    <path d="M903,44 L905,50 L911,50 L906,54 L908,60 L903,56 L898,60 L900,54 L895,50 L901,50 Z" fill="#22c55e" opacity=".9"/>
    <circle cx="903" cy="70" r="7" fill="#0f1a0f" stroke="#22c55e" stroke-width="2" class="node-65"/>
    <circle cx="903" cy="70" r="3" fill="#22c55e"/>
