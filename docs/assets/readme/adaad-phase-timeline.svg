  <circle cx="890" cy="70" r="3.5" fill="#16181d" stroke="#22c55e" stroke-width="1"/>
  <text x="890" y="90" class="t-num" fill="#22c55e" text-anchor="middle">64</text>
  <text x="890" y="99" class="t-sub" text-anchor="middle">CEL</text>

