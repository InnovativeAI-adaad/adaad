  <text x="1120" y="90" class="t-num" fill="#ec4899" text-anchor="middle">81</text>
  <text x="1120" y="99" class="t-sub" text-anchor="middle">Self-Discovery</text>

  <!-- Phase 82 -->
  <circle cx="1133" cy="70" r="3" fill="#16181d" stroke="#ec4899" stroke-width="1"/>
  <text x="1133" y="90" class="t-num" fill="#ec4899" text-anchor="middle">82</text>
  <text x="1133" y="99" class="t-sub" text-anchor="middle">Pareto Evo</text>

  <!-- Phase 83 -->
  <circle cx="1147" cy="70" r="3" fill="#16181d" stroke="#ec4899" stroke-width="1"/>
  <text x="1147" y="90" class="t-num" fill="#ec4899" text-anchor="middle">83</text>
  <text x="1147" y="99" class="t-sub" text-anchor="middle">Causal Attr</text>

  <!-- PHASE 84 — CURRENT -->
  <g class="evo-node">
    <circle cx="1160" cy="70" r="10" fill="#ec4899" opacity=".1"/>
    <circle cx="1160" cy="70" r="6" fill="#100a10" stroke="#ec4899" stroke-width="2"/>
    <circle cx="1160" cy="70" r="2.5" fill="#ec4899"/>
  </g>
  <text x="1160" y="88" class="t-num" fill="#ec4899" text-anchor="middle" style="font-weight:900">84</text>
  <text x="1160" y="97" class="t-sub" text-anchor="middle" style="fill:#ec4899;font-weight:700">CURRENT ◈</text>
  <text x="1160" y="106" class="t-sub" text-anchor="middle" style="fill:#ec4899">Half-Life Decay</text>

  <!-- Bottom metadata bar -->
  <rect x="0" y="160" width="1200" height="10" fill="#16181d"/>
  <text x="40"  y="168" class="t-hash">ADAAD v9.16.0 · 84 Phases Complete · 4,800+ tests · 36 constitutional invariants · first self-evolution: Phase 65, Mar 13 2026 · pip install adaad</text>
  <circle cx="1170" cy="165" r="3" fill="#22c55e" opacity=".7"/>
  <text x="1155" y="168" class="t-hash" text-anchor="end">LIVE</text>
</svg>
