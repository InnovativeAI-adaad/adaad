<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 170" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .t-lbl{font-family:'Inter',Arial,sans-serif;font-weight:600;font-size:8px;fill:#8c919b;letter-spacing:1px}
      .t-num{font-family:'Inter',Arial,sans-serif;font-weight:700;font-size:7px}
      .t-era{font-family:'Inter',Arial,sans-serif;font-weight:700;font-size:9px;letter-spacing:1.5px}
      .t-sub{font-family:'Inter',Arial,sans-serif;font-weight:400;font-size:7px;fill:#8c919b}
      .t-hash{font-family:'JetBrains Mono','Courier New',monospace;font-size:6.5px;fill:#2b2f36}
      @keyframes pulseNode{0%,100%{r:6;opacity:1}50%{r:8;opacity:.7}}
      @keyframes lineGrow{0%{stroke-dashoffset:1200}100%{stroke-dashoffset:0}}
      .timeline-line{stroke-dasharray:1200;animation:lineGrow 2s ease-out forwards}
      .node-65{animation:pulseNode 2s ease-in-out infinite}
      @keyframes glow65{0%,100%{filter:drop-shadow(0 0 4px #22c55e)}50%{filter:drop-shadow(0 0 12px #22c55e)}}
      .crown{animation:glow65 2s ease-in-out infinite}
      @keyframes glowEvo{0%,100%{filter:drop-shadow(0 0 4px #ec4899)}50%{filter:drop-shadow(0 0 10px #ec4899)}}
      .evo-node{animation:glowEvo 2.4s ease-in-out infinite}
    </style>
    <linearGradient id="tlBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b0c0f"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <linearGradient id="tlBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity=".6"/>
      <stop offset="55%"  stop-color="#8b5cf6" stop-opacity=".5"/>
      <stop offset="75%"  stop-color="#22c55e" stop-opacity=".9"/>
      <stop offset="88%"  stop-color="#f97316" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity=".9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="170" fill="url(#tlBg)"/>
  <rect width="1200" height="170" fill="none" stroke="#2b2f36" stroke-width="1"/>

  <text x="600" y="22" class="t-era" fill="#8c919b" text-anchor="middle">PHASE TIMELINE · 84 PHASES COMPLETE · CONSTITUTIONAL EVOLUTION ENGINE</text>
  <line x1="40" y1="28" x2="1160" y2="28" stroke="#2b2f36" stroke-width=".5"/>

  <rect x="40" y="68" width="1120" height="4" rx="2" fill="#1a1c22"/>
  <rect x="40" y="68" width="1120" height="4" rx="2" fill="url(#tlBar)" class="timeline-line"/>

  <!-- Foundation 1–8 -->
  <rect x="40"  y="45" width="95"  height="80" rx="2" fill="#3b82f6" opacity=".04"/>
  <text x="87"  y="42" class="t-era" fill="#3b82f6" text-anchor="middle" style="font-size:7px">FOUNDATION</text>

  <!-- Build-out 9–56 -->
  <rect x="135" y="45" width="660" height="80" rx="2" fill="#8b5cf6" opacity=".03"/>
  <text x="465" y="42" class="t-era" fill="#8b5cf6" text-anchor="middle" style="font-size:7px">CORE BUILD-OUT · 48 PHASES</text>

  <!-- Emergence 57–65 -->
  <rect x="795" y="45" width="108" height="80" rx="2" fill="#22c55e" opacity=".05"/>
  <text x="849" y="42" class="t-era" fill="#22c55e" text-anchor="middle" style="font-size:7px">EMERGENCE</text>

  <!-- Hardening/Seed 66–80 -->
  <rect x="903" y="45" width="190" height="80" rx="2" fill="#f97316" opacity=".03"/>
  <text x="998" y="42" class="t-era" fill="#f97316" text-anchor="middle" style="font-size:7px">HARDENING · SEED</text>

  <!-- Evolution Engine 81–84 -->
  <rect x="1093" y="45" width="67" height="80" rx="2" fill="#ec4899" opacity=".07"/>
  <text x="1127" y="42" class="t-era" fill="#ec4899" text-anchor="middle" style="font-size:7px">EVO ENGINE</text>

  <!-- Phase 1 -->
  <circle cx="40"  cy="70" r="4" fill="#16181d" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="40"  y="90" class="t-num" fill="#3b82f6" text-anchor="middle">1</text>
  <text x="40"  y="99" class="t-sub" text-anchor="middle">GovernanceGate</text>

  <!-- Phase 5 -->
  <circle cx="94"  cy="70" r="3" fill="#16181d" stroke="#3b82f6" stroke-width="1"/>
  <text x="94"  y="90" class="t-num" fill="#3b82f6" text-anchor="middle">5</text>
  <text x="94"  y="99" class="t-sub" text-anchor="middle">Federation</text>

  <!-- Phase 10 -->
  <circle cx="161" cy="70" r="3.5" fill="#16181d" stroke="#8b5cf6" stroke-width="1"/>
  <text x="161" y="90" class="t-num" fill="#8b5cf6" text-anchor="middle">10</text>

  <!-- Phase 20 -->
  <circle cx="296" cy="70" r="3.5" fill="#16181d" stroke="#8b5cf6" stroke-width="1"/>
  <text x="296" y="90" class="t-num" fill="#8b5cf6" text-anchor="middle">20</text>

  <!-- Phase 30 -->
  <circle cx="431" cy="70" r="3.5" fill="#16181d" stroke="#8b5cf6" stroke-width="1"/>
  <text x="431" y="90" class="t-num" fill="#8b5cf6" text-anchor="middle">30</text>
  <text x="431" y="99" class="t-sub" text-anchor="middle">AdmissionBand</text>

  <!-- Phase 40 -->
  <circle cx="566" cy="70" r="3.5" fill="#16181d" stroke="#8b5cf6" stroke-width="1"/>
  <text x="566" y="90" class="t-num" fill="#8b5cf6" text-anchor="middle">40</text>

  <!-- Phase 57 -->
  <circle cx="795" cy="70" r="4" fill="#16181d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="795" y="90" class="t-num" fill="#22c55e" text-anchor="middle">57</text>
  <text x="795" y="99" class="t-sub" text-anchor="middle">ProposalEngine</text>

  <!-- Phase 60 -->
  <circle cx="836" cy="70" r="3.5" fill="#16181d" stroke="#22c55e" stroke-width="1"/>
  <text x="836" y="90" class="t-num" fill="#22c55e" text-anchor="middle">60</text>
  <text x="836" y="99" class="t-sub" text-anchor="middle">AST Substrate</text>

