<svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Traditional AI coding tools create human bottlenecks</title>
  <desc id="desc">Three disconnected AI suggestions flow into a single overloaded human reviewer, highlighting missing governance, replay proof, and durable memory.</desc>
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020a18"/>
      <stop offset="100%" stop-color="#031328"/>
    </linearGradient>
  </defs>
  <rect width="420" height="220" rx="18" fill="url(#bg1)"/>
  <rect x="1" y="1" width="418" height="218" rx="17" fill="none" stroke="#00d4ff" opacity="0.28"/>

  <text x="24" y="34" fill="#f5c842" font-family="'Courier New',monospace" font-size="14" font-weight="700" letter-spacing="1.1">PANEL 1 · PROBLEM</text>
  <text x="24" y="56" fill="#c6d8ea" font-family="'Courier New',monospace" font-size="11">Traditional AI coding tools</text>

  <rect x="28" y="76" width="98" height="28" rx="7" fill="#0b2035" stroke="#00d4ff" opacity="0.95"/>
  <text x="77" y="94" text-anchor="middle" fill="#8fdfff" font-family="'Courier New',monospace" font-size="10">Suggestion A</text>

  <rect x="28" y="114" width="98" height="28" rx="7" fill="#0f1f29" stroke="#00ff88" opacity="0.95"/>
  <text x="77" y="132" text-anchor="middle" fill="#8cffc8" font-family="'Courier New',monospace" font-size="10">Suggestion B</text>

  <rect x="28" y="152" width="98" height="28" rx="7" fill="#221126" stroke="#ff4466" opacity="0.95"/>
  <text x="77" y="170" text-anchor="middle" fill="#ff9aae" font-family="'Courier New',monospace" font-size="10">Suggestion C</text>

  <path d="M138 90 L212 110" stroke="#6ba8d1" stroke-width="2"/>
  <path d="M138 128 L212 120" stroke="#6ba8d1" stroke-width="2"/>
  <path d="M138 166 L212 130" stroke="#6ba8d1" stroke-width="2"/>

  <rect x="220" y="96" width="172" height="64" rx="9" fill="#140f1a" stroke="#f5c842"/>
  <text x="306" y="118" text-anchor="middle" fill="#ffd96f" font-family="'Courier New',monospace" font-size="11" font-weight="700">Human is last defense</text>
  <text x="306" y="136" text-anchor="middle" fill="#d8cfc1" font-family="'Courier New',monospace" font-size="9">Manual judgment for every patch</text>
  <text x="306" y="151" text-anchor="middle" fill="#d8cfc1" font-family="'Courier New',monospace" font-size="9">No invariant gate before apply</text>

  <text x="24" y="198" fill="#9ab0c6" font-family="'Courier New',monospace" font-size="10">No constitutional guardrail · No replay proof · No durable lineage memory</text>
</svg>
