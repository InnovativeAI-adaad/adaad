<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
    @keyframes glow  { 0%,100%{filter:drop-shadow(0 0 4px #00d4ff)} 50%{filter:drop-shadow(0 0 18px #00d4ff) drop-shadow(0 0 36px #0080ff)} }
    @keyframes dash  { to{stroke-dashoffset:-40} }
    @keyframes slide { from{transform:translateX(-8px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes spin  { to{transform:rotate(360deg)} }
    @keyframes blink { 0%,100%{opacity:1} 49%{opacity:1} 50%{opacity:0} 99%{opacity:0} }
    @keyframes count { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes trace { 0%{stroke-dashoffset:200} 100%{stroke-dashoffset:-200} }
    .circuit { stroke:#00d4ff; stroke-width:1; fill:none; stroke-dasharray:6 6; animation:trace 4s linear infinite; opacity:.25 }
    .circuit2 { stroke:#00ff88; stroke-width:.8; fill:none; stroke-dasharray:4 8; animation:trace 6s linear infinite reverse; opacity:.18 }
    .shield-glow { animation:glow 3s ease-in-out infinite }
    .title { font-family:'Segoe UI',Arial,sans-serif; font-weight:900; fill:#ffffff; letter-spacing:2px }
    .sub   { font-family:'Segoe UI',Arial,sans-serif; fill:#8b9ab0; font-size:13px }
    .stat-val { font-family:'Courier New',monospace; font-weight:700; font-size:28px }
    .stat-lbl { font-family:'Segoe UI',Arial,sans-serif; font-size:10px; fill:#8b9ab0; text-transform:uppercase; letter-spacing:1.5px }
    .dot { animation:pulse 2s ease-in-out infinite }
    .bar-fill { animation:slide .8s ease-out both }
  </style>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0a0e17"/>
    <stop offset="50%" style="stop-color:#0d1117"/>
    <stop offset="100%" style="stop-color:#0a1628"/>
  </linearGradient>
  <linearGradient id="shield-g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#00d4ff"/>
    <stop offset="100%" style="stop-color:#0051ff"/>
  </linearGradient>
  <linearGradient id="green-g" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#00ff88"/>
    <stop offset="100%" style="stop-color:#00b860"/>
  </linearGradient>
  <linearGradient id="cyan-g" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#00d4ff"/>
    <stop offset="100%" style="stop-color:#0080cc"/>
  </linearGradient>
  <linearGradient id="red-g" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#ff4466"/>
    <stop offset="100%" style="stop-color:#cc1133"/>
  </linearGradient>
  <linearGradient id="purple-g" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#a855f7"/>
    <stop offset="100%" style="stop-color:#7c3aed"/>
  </linearGradient>
  <filter id="soft-glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="1200" height="340" fill="url(#bg)"/>
<rect width="1200" height="340" fill="none" stroke="#1a2332" stroke-width="1"/>

<!-- Circuit traces background -->
<path class="circuit"  d="M0 80 H300 V40 H600 V120 H900 V60 H1200"/>
<path class="circuit"  d="M0 200 H200 V160 H500 V220 H800 V180 H1200" style="animation-delay:1s"/>
<path class="circuit"  d="M0 280 H400 V300 H700 V260 H1000 V290 H1200" style="animation-delay:2s"/>
<path class="circuit2" d="M100 0 V100 H150 V200 H100 V340" style="animation-delay:.5s"/>
<path class="circuit2" d="M400 0 V60 H450 V140 H400 V340" style="animation-delay:1.5s"/>
<path class="circuit2" d="M750 0 V80 H800 V180 H750 V340" style="animation-delay:2.5s"/>
<path class="circuit2" d="M1050 0 V50 H1100 V160 H1050 V340" style="animation-delay:.8s"/>

<!-- Animated dots on circuit traces -->
<circle r="3" fill="#00d4ff" opacity="0"><animate attributeName="cx" from="0" to="1200" dur="5s" repeatCount="indefinite"/><animate attributeName="cy" values="80;80" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite"/></circle>
<circle r="2.5" fill="#00ff88" opacity="0"><animate attributeName="cx" from="1200" to="0" dur="6s" repeatCount="indefinite" begin="2s"/><animate attributeName="cy" values="200;200" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.8;.8;0" dur="6s" repeatCount="indefinite" begin="2s"/></circle>
<circle r="2" fill="#a855f7" opacity="0"><animate attributeName="cx" from="0" to="1200" dur="7s" repeatCount="indefinite" begin="1s"/><animate attributeName="cy" values="280;280" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.6;.6;0" dur="7s" repeatCount="indefinite" begin="1s"/></circle>

<!-- SHIELD LOGO (left anchor) -->
<g transform="translate(60,170)" class="shield-glow">
  <!-- Shield shape -->
  <path d="M0,-90 L60,-70 L60,10 Q60,60 0,90 Q-60,60 -60,10 L-60,-70 Z" fill="url(#shield-g)" opacity=".9"/>
  <path d="M0,-80 L52,-62 L52,12 Q52,52 0,78 Q-52,52 -52,12 L-52,-62 Z" fill="#0d1117" opacity=".6"/>
  <!-- AD letters -->
  <text x="0" y="12" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="38" fill="#ffffff" filter="url(#soft-glow)">AD</text>
  <!-- Speed lines -->
  <line x1="-72" y1="-20" x2="-58" y2="-20" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/></line>
  <line x1="-78" y1="-8" x2="-60" y2="-8" stroke="#00ff88" stroke-width="2" stroke-linecap="round"><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin=".3s"/></line>
  <line x1="-70" y1="4" x2="-56" y2="4" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin=".6s"/></line>
</g>

<!-- Main title area -->
<text x="195" y="122" class="title" font-size="58" fill="url(#cyan-g)" filter="url(#soft-glow)">ADAAD</text>
<text x="197" y="148" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#00d4ff" letter-spacing="5">AUTONOMOUS  DEVICE-ANCHORED  ADAPTIVE  DEVELOPMENT</text>
<text x="197" y="173" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#8b9ab0">AI that governs its own evolution — with you in control.</text>

<!-- Version pill -->
<rect x="197" y="190" width="130" height="26" rx="13" fill="#0d1117" stroke="#00d4ff" stroke-width="1.2"/>
<text x="262" y="207" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#00d4ff" font-weight="700">v9.27.0  LIVE</text>
<circle cx="210" cy="203" r="4" fill="#00ff88"><animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/></circle>

<!-- Stat cards row -->
<g transform="translate(197, 240)">
  <!-- PHASES -->
  <rect width="140" height="68" rx="8" fill="#0d1a2a" stroke="#00d4ff" stroke-width="1"/>
  <text x="70" y="28" text-anchor="middle" class="stat-val" fill="url(#cyan-g)" filter="url(#soft-glow)">94</text>
  <text x="70" y="42" text-anchor="middle" class="stat-lbl">Phases</text>
  <rect x="10" y="50" width="120" height="3" rx="1.5" fill="#1a2a3a"/>
  <rect x="10" y="50" width="112" height="3" rx="1.5" fill="url(#cyan-g)" class="bar-fill" style="animation-delay:.2s"><animate attributeName="width" from="0" to="112" dur="1.5s" begin=".2s" fill="freeze"/></rect>

  <!-- INNOVATIONS -->
  <rect x="150" width="140" height="68" rx="8" fill="#0d1a2a" stroke="#00ff88" stroke-width="1"/>
  <text x="220" y="28" text-anchor="middle" class="stat-val" fill="url(#green-g)" filter="url(#soft-glow)">10</text>
  <text x="220" y="42" text-anchor="middle" class="stat-lbl">Innovations</text>
  <rect x="160" y="50" width="120" height="3" rx="1.5" fill="#1a2a1a"/>
  <rect x="160" y="50" width="100" height="3" rx="1.5" fill="url(#green-g)"><animate attributeName="width" from="0" to="100" dur="1.5s" begin=".4s" fill="freeze"/></rect>

  <!-- INVARIANTS -->
  <rect x="300" width="140" height="68" rx="8" fill="#1a0d1a" stroke="#ff4466" stroke-width="1"/>
  <text x="370" y="28" text-anchor="middle" class="stat-val" fill="url(#red-g)" filter="url(#soft-glow)">27</text>
  <text x="370" y="42" text-anchor="middle" class="stat-lbl">Invariants</text>
  <rect x="310" y="50" width="120" height="3" rx="1.5" fill="#2a0d1a"/>
  <rect x="310" y="50" width="108" height="3" rx="1.5" fill="url(#red-g)"><animate attributeName="width" from="0" to="108" dur="1.5s" begin=".6s" fill="freeze"/></rect>

  <!-- TESTS -->
  <rect x="450" width="140" height="68" rx="8" fill="#1a0d2a" stroke="#a855f7" stroke-width="1"/>
  <text x="520" y="28" text-anchor="middle" class="stat-val" fill="url(#purple-g)" filter="url(#soft-glow)">5680</text>
  <text x="520" y="42" text-anchor="middle" class="stat-lbl">Tests passing</text>
  <rect x="460" y="50" width="120" height="3" rx="1.5" fill="#1a0d2a"/>
  <rect x="460" y="50" width="116" height="3" rx="1.5" fill="url(#purple-g)"><animate attributeName="width" from="0" to="116" dur="1.5s" begin=".8s" fill="freeze"/></rect>
</g>

<!-- Right panel: phase timeline mini -->
<g transform="translate(830,40)">
  <text x="180" y="16" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8b9ab0" letter-spacing="2">LATEST PHASES</text>
  <!-- Phase rows -->
  <g transform="translate(0,28)">
    <rect width="360" height="22" rx="4" fill="#0d1a2a" stroke="#1a2a3a"/>
    <circle cx="12" cy="11" r="5" fill="#00ff88" opacity=".9"/>
    <text x="24" y="15" font-family="'Courier New',monospace" font-size="11" fill="#00ff88">Ph.94</text>
    <text x="70" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e0e6f0">Morphogenetic Memory (MMEM)</text>
    <text x="300" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#00d4ff">INNOV-10</text>
  </g>
  <g transform="translate(0,55)">
    <rect width="360" height="22" rx="4" fill="#0d1a2a" stroke="#1a2a3a"/>
    <circle cx="12" cy="11" r="5" fill="#00d4ff" opacity=".8"/>
    <text x="24" y="15" font-family="'Courier New',monospace" font-size="11" fill="#00d4ff">Ph.93</text>
    <text x="70" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8b9ab0">Aesthetic Fitness Signal (AFIT)</text>
    <text x="300" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8b9ab0">INNOV-09</text>
  </g>
  <g transform="translate(0,82)">
    <rect width="360" height="22" rx="4" fill="#0d1a2a" stroke="#1a2a3a"/>
    <circle cx="12" cy="11" r="5" fill="#a855f7" opacity=".7"/>
    <text x="24" y="15" font-family="'Courier New',monospace" font-size="11" fill="#a855f7">Ph.92</text>
    <text x="70" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8b9ab0">Adversarial Red Team (AFRT)</text>
    <text x="300" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8b9ab0">INNOV-08</text>
  </g>
  <g transform="translate(0,109)">
    <rect width="360" height="22" rx="4" fill="#0d1a2a" stroke="#1a2a3a"/>
    <circle cx="12" cy="11" r="5" fill="#ff8800" opacity=".7"/>
    <text x="24" y="15" font-family="'Courier New',monospace" font-size="11" fill="#ff8800">Ph.91</text>
    <text x="70" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8b9ab0">Live Shadow Execution (LSME)</text>
    <text x="300" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8b9ab0">INNOV-07</text>
  </g>
  <g transform="translate(0,136)">
    <rect width="360" height="22" rx="4" fill="#0d1a2a" stroke="#1a2a3a"/>
    <circle cx="12" cy="11" r="5" fill="#ffcc00" opacity=".6"/>
    <text x="24" y="15" font-family="'Courier New',monospace" font-size="11" fill="#ffcc00">Ph.90</text>
    <text x="70" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8b9ab0">Crypto Evolution DAG (CEPD)</text>
    <text x="300" y="15" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8b9ab0">INNOV-06</text>
  </g>

  <!-- Live indicator -->
  <g transform="translate(0,175)">
    <rect width="360" height="28" rx="5" fill="#001a00" stroke="#00ff88" stroke-width="1"/>
    <circle cx="14" cy="14" r="5" fill="#00ff88"><animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;.4;1" dur="1s" repeatCount="indefinite"/></circle>
    <text x="26" y="19" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#00ff88" font-weight="600">Constitutional Evolution Loop LIVE</text>
    <text x="280" y="19" font-family="'Courier New',monospace" font-size="10" fill="#00ff88">v9.27.0</text>
  </g>

  <!-- Governance badge -->
  <g transform="translate(0,214)">
    <rect width="173" height="26" rx="5" fill="#0d1117" stroke="#00d4ff" stroke-width="1"/>
    <text x="86" y="17" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#00d4ff">🔑 HUMAN-0: Dustin L. Reid</text>
  </g>
  <g transform="translate(183,214)">
    <rect width="177" height="26" rx="5" fill="#0d1117" stroke="#a855f7" stroke-width="1"/>
    <text x="88" y="17" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#a855f7">⛓ Apache 2.0 · Open Source</text>
  </g>
</g>

<!-- Bottom border glow -->
<rect x="0" y="337" width="1200" height="3" fill="none">
  <animate attributeName="fill" values="#00d4ff;#00ff88;#a855f7;#ff4466;#00d4ff" dur="4s" repeatCount="indefinite"/>
</rect>
</svg>
