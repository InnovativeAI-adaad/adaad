<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="a-bg" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#0a1628"/>
    <stop offset="100%" stop-color="#020810"/>
  </radialGradient>
  <radialGradient id="a-glow" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </radialGradient>
  <filter id="a-blur">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="a-hex" x="0" y="0" width="34" height="40" patternUnits="userSpaceOnUse">
    <polygon points="17,2 31,10 31,26 17,34 3,26 3,10" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.12"/>
  </pattern>
  <clipPath id="a-circle">
    <circle cx="200" cy="200" r="185"/>
  </clipPath>
  <linearGradient id="a-ring" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#f5c842" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.9"/>
  </linearGradient>
  <style>
    @keyframes a-pulse{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes a-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes a-spin2{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
    @keyframes a-node{0%,100%{opacity:.7}50%{opacity:1}}
    .a-orbit1{transform-origin:200px 200px;animation:a-spin 12s linear infinite}
    .a-orbit2{transform-origin:200px 200px;animation:a-spin2 18s linear infinite}
    .a-beacon{animation:a-pulse 2.5s ease-in-out infinite}
    .a-node1{animation:a-node 3s ease-in-out infinite}
    .a-node2{animation:a-node 3s ease-in-out infinite 1s}
    .a-node3{animation:a-node 3s ease-in-out infinite 2s}
  </style>
</defs>
<circle cx="200" cy="200" r="200" fill="url(#a-bg)"/>
<circle cx="200" cy="200" r="185" fill="url(#a-glow)"/>
<rect width="400" height="400" fill="url(#a-hex)" clip-path="url(#a-circle)"/>
<circle cx="200" cy="200" r="178" fill="none" stroke="url(#a-ring)" stroke-width="1.5" opacity="0.5"/>
<circle cx="200" cy="200" r="175" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.3"/>
<g clip-path="url(#a-circle)" opacity="0.08">
  <line x1="50" y1="200" x2="350" y2="200" stroke="#00d4ff" stroke-width="0.8"/>
  <line x1="200" y1="50" x2="200" y2="350" stroke="#00d4ff" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#00d4ff" stroke-width="0.6"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#00d4ff" stroke-width="0.6"/>
</g>
<g class="a-orbit1">
  <ellipse cx="200" cy="200" rx="135" ry="40" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2" transform="rotate(-20,200,200)"/>
  <circle cx="335" cy="200" r="5" fill="#00d4ff" opacity="0.8" filter="url(#a-blur)" class="a-node1"/>
</g>
<g class="a-orbit2">
  <ellipse cx="200" cy="200" rx="110" ry="35" fill="none" stroke="#f5c842" stroke-width="0.8" opacity="0.18" transform="rotate(45,200,200)"/>
  <circle cx="310" cy="200" r="4" fill="#f5c842" opacity="0.7" filter="url(#a-blur)" class="a-node2"/>
</g>
<g opacity="0.92">
  <rect x="182" y="120" width="36" height="120" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.65"/>
  <rect x="186" y="124" width="28" height="112" rx="1" fill="#001a2a" opacity="0.85"/>
  <rect x="182" y="150" width="36" height="1.5" fill="#00d4ff" opacity="0.7"/>
  <rect x="182" y="178" width="36" height="1.5" fill="#00d4ff" opacity="0.7"/>
  <rect x="182" y="206" width="36" height="1.5" fill="#00d4ff" opacity="0.5"/>
  <rect x="128" y="165" width="54" height="20" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <rect x="132" y="169" width="46" height="12" rx="1" fill="#001525" opacity="0.85"/>
  <rect x="218" y="165" width="54" height="20" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <rect x="222" y="169" width="46" height="12" rx="1" fill="#001525" opacity="0.85"/>
  <line x1="182" y1="175" x2="128" y2="175" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="218" y1="175" x2="272" y2="175" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <polygon points="200,95 220,120 180,120" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.85" filter="url(#a-blur)"/>
  <polygon points="200,100 216,120 184,120" fill="#120a00" opacity="0.6"/>
  <circle cx="200" cy="97" r="4" fill="#f5c842" opacity="0.95" filter="url(#a-blur)" class="a-beacon"/>
  <rect x="155" y="240" width="90" height="8" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <rect x="140" y="248" width="120" height="6" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <rect x="125" y="254" width="150" height="5" rx="2" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="200" cy="140" r="2.5" fill="#00d4ff" opacity="0.85" class="a-node1"/>
  <circle cx="200" cy="168" r="2" fill="#f5c842" opacity="0.75" class="a-node2"/>
  <circle cx="200" cy="196" r="2" fill="#00d4ff" opacity="0.65" class="a-node3"/>
</g>
<g stroke="#00d4ff" stroke-width="0.6" opacity="0.25">
  <line x1="150" y1="95" x2="155" y2="95"/>
  <line x1="150" y1="115" x2="155" y2="115"/>
  <line x1="150" y1="135" x2="155" y2="135"/>
  <line x1="150" y1="155" x2="155" y2="155"/>
  <line x1="150" y1="95" x2="150" y2="155"/>
  <line x1="245" y1="95" x2="250" y2="95"/>
  <line x1="245" y1="115" x2="250" y2="115"/>
  <line x1="245" y1="135" x2="250" y2="135"/>
  <line x1="245" y1="155" x2="250" y2="155"/>
  <line x1="250" y1="95" x2="250" y2="155"/>
</g>
<g stroke="#f5c842" stroke-width="1.5" fill="none" opacity="0.55">
  <path d="M68,68 L68,88 L88,88"/>
  <path d="M332,68 L332,88 L312,88"/>
  <path d="M68,332 L68,312 L88,312"/>
  <path d="M332,332 L332,312 L312,312"/>
</g>
<rect x="120" y="298" width="160" height="36" rx="18" fill="#001828" stroke="#00d4ff" stroke-width="1" opacity="0.92"/>
<text x="200" y="314" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#00d4ff" letter-spacing="3" opacity="0.9">ARCHITECT</text>
<text x="200" y="327" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#f5c842" letter-spacing="1.5" opacity="0.7">GOVERNANCE · STRUCTURE</text>
<circle cx="200" cy="200" r="196" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
</svg>
