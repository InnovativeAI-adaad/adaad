<svg style="max-width:100%;height:auto" width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="pipe_grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#00d4ff" /><stop offset="100%" style="stop-color:#00ff88" /></linearGradient><style>
    .step-box { fill: #0d1a2a; stroke: #1a2a3a; stroke-width: 2; transition: all 0.3s; }
    .step-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #8b9ab0; text-anchor: middle; }
    .step-num { font-family: 'Courier New', monospace; font-size: 12px; fill: #00d4ff; font-weight: bold; }
    @keyframes flow { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
    .flow-line { stroke: url(#pipe_grad); stroke-width: 2; stroke-dasharray: 10, 5; animation: flow 5s linear infinite; }
  </style></defs><rect width="1200" height="300" fill="#070a10" rx="10" /><path d="M 50 150 L 1150 150" class="flow-line" fill="none" /><g transform="translate(100, 150)"><circle r="40" class="step-box" stroke="#00d4ff" /><text y="5" class="step-num">0</text><text y="60" class="step-text">Identity</text></g><g transform="translate(225, 150)"><circle r="40" class="step-box" /><text y="5" class="step-num">1</text><text y="60" class="step-text">Proposal</text></g><g transform="translate(350, 150)"><circle r="40" class="step-box" stroke="#ff4466" /><text y="5" class="step-num">2-3</text><text y="60" class="step-text">Red Team</text></g><g transform="translate(475, 150)"><circle r="40" class="step-box" /><text y="5" class="step-num">4</text><text y="60" class="step-text">Scoring</text></g><g transform="translate(600, 150)"><circle r="40" class="step-box" stroke="#00ccaa" /><text y="5" class="step-num">5</text><text y="60" class="step-text">Shadow</text></g><g transform="translate(725, 150)"><circle r="40" class="step-box" stroke="#00d4ff" /><text y="5" class="step-num">6</text><text y="60" class="step-text">Governance</text></g><g transform="translate(850, 150)"><circle r="40" class="step-box" stroke="#f5c842" /><text y="5" class="step-num">7</text><text y="60" class="step-text">Human</text></g><g transform="translate(975, 150)"><circle r="40" class="step-box" stroke="#00ff88" /><text y="5" class="step-num">8</text><text y="60" class="step-text">Ledger</text></g><g transform="translate(1100, 150)"><circle r="40" class="step-box" stroke="#a855f7" /><text y="5" class="step-num">9</text><text y="60" class="step-text">Proof</text></g></svg>