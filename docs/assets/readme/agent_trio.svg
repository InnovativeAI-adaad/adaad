<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="t-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#060d18"/>
    <stop offset="100%" stop-color="#020408"/>
  </radialGradient>
  <filter id="t-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="t-soft"><feGaussianBlur stdDeviation="15"/></filter>
  <style>
    @keyframes t-pulse{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes t-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes t-spin2{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
    @keyframes t-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .t-a1{transform-origin:175px 155px;animation:t-spin 14s linear infinite}
    .t-a2{transform-origin:450px 155px;animation:t-spin2 11s linear infinite}
    .t-b1{transform-origin:725px 155px;animation:t-spin 9s linear infinite}
    .t-pulse{animation:t-pulse 2s ease-in-out infinite}
    .t-pulse2{animation:t-pulse 2s ease-in-out infinite .7s}
    .t-pulse3{animation:t-pulse 2s ease-in-out infinite 1.4s}
  </style>
</defs>
<rect width="900" height="320" fill="url(#t-bg)" rx="12"/>
<!-- Background glow blobs -->
<circle cx="175" cy="155" r="80" fill="#00d4ff" opacity="0.05" filter="url(#t-soft)"/>
<circle cx="450" cy="155" r="80" fill="#a855f7" opacity="0.05" filter="url(#t-soft)"/>
<circle cx="725" cy="155" r="80" fill="#ff4466" opacity="0.05" filter="url(#t-soft)"/>
<!-- Connecting energy line between agents -->
<line x1="270" y1="155" x2="355" y2="155" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="4 6"/>
<line x1="545" y1="155" x2="630" y2="155" stroke="#a855f7" stroke-width="1" opacity="0.3" stroke-dasharray="4 6"/>
<circle cx="312" cy="155" r="3" fill="#00d4ff" opacity="0.6" class="t-pulse" filter="url(t-glow)"/>
<circle cx="587" cy="155" r="3" fill="#a855f7" opacity="0.6" class="t-pulse2" filter="url(t-glow)"/>
<!-- Architect - left -->
<g>
  <circle cx="175" cy="155" r="88" fill="#000d18" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <g class="t-a1">
    <circle cx="175" cy="155" r="75" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="8 6" opacity="0.25"/>
    <circle cx="250" cy="155" r="5" fill="#00d4ff" opacity="0.8" filter="url(#t-glow)" class="t-pulse"/>
  </g>
  <!-- Architect symbol: blueprint tower -->
  <rect x="163" y="110" width="24" height="80" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <rect x="167" y="114" width="16" height="72" rx="1" fill="#001525" opacity="0.8"/>
  <rect x="163" y="130" width="24" height="1.5" fill="#00d4ff" opacity="0.7"/>
  <rect x="163" y="148" width="24" height="1.5" fill="#00d4ff" opacity="0.6"/>
  <rect x="163" y="166" width="24" height="1.5" fill="#00d4ff" opacity="0.5"/>
  <rect x="135" y="143" width="28" height="14" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="187" y="143" width="28" height="14" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="163" y1="150" x2="135" y2="150" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="187" y1="150" x2="215" y2="150" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
  <polygon points="175,98 188,110 162,110" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.8" filter="url(#t-glow)"/>
  <circle cx="175" cy="100" r="3" fill="#f5c842" opacity="0.9" filter="url(#t-glow)" class="t-pulse"/>
  <rect x="148" y="193" width="54" height="5" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <text x="175" y="245" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00d4ff" letter-spacing="2" opacity="0.9">ARCHITECT</text>
  <text x="175" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#f5c842" letter-spacing="1" opacity="0.65">STRUCTURE · COMPLIANCE</text>
  <text x="175" y="277" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#00d4ff" opacity="0.5">risk 0.1–0.4 · tier-0 guard</text>
</g>
<!-- Dream - center -->
<g>
  <circle cx="450" cy="155" r="88" fill="#0d0820" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
  <g class="t-a2">
    <circle cx="450" cy="155" r="72" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="6 8" opacity="0.2"/>
    <circle cx="450" cy="83" r="5" fill="#a855f7" opacity="0.8" filter="url(#t-glow)" class="t-pulse2"/>
    <circle cx="522" cy="155" r="4" fill="#00d4ff" opacity="0.6" filter="url(#t-glow)"/>
  </g>
  <!-- Dream symbol: eye -->
  <ellipse cx="450" cy="155" rx="48" ry="32" fill="none" stroke="#a855f7" stroke-width="1.2" opacity="0.5"/>
  <circle cx="450" cy="155" r="22" fill="#0d0820" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <circle cx="450" cy="155" r="15" fill="#a855f7" opacity="0.2" filter="url(#t-glow)"/>
  <circle cx="450" cy="155" r="9" fill="#a855f7" opacity="0.5" filter="url(#t-glow)"/>
  <circle cx="450" cy="155" r="5" fill="#a855f7" opacity="0.9" filter="url(#t-glow)" class="t-pulse2"/>
  <circle cx="443" cy="148" r="3" fill="white" opacity="0.25"/>
  <!-- Stars -->
  <circle cx="380" cy="100" r="2" fill="white" opacity="0.5" class="t-pulse"/>
  <circle cx="520" cy="95" r="1.8" fill="#a855f7" opacity="0.7" class="t-pulse2"/>
  <circle cx="510" cy="210" r="1.8" fill="white" opacity="0.5" class="t-pulse3"/>
  <circle cx="390" cy="215" r="1.5" fill="#00d4ff" opacity="0.6" class="t-pulse"/>
  <text x="450" y="245" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#a855f7" letter-spacing="2" opacity="0.9">DREAM</text>
  <text x="450" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#00d4ff" letter-spacing="1" opacity="0.65">NOVELTY · EXPLORATION</text>
  <text x="450" y="277" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#a855f7" opacity="0.5">gain 0.5–0.9 · 200 epoch view</text>
</g>
<!-- Beast - right -->
<g>
  <circle cx="725" cy="155" r="88" fill="#1a0404" stroke="#ff4466" stroke-width="1.5" opacity="0.7"/>
  <g class="t-b1">
    <circle cx="725" cy="155" r="76" fill="none" stroke="#ff4466" stroke-width="1" stroke-dasharray="10 5" opacity="0.25"/>
    <circle cx="801" cy="155" r="6" fill="#ff4466" opacity="0.85" filter="url(#t-glow)" class="t-pulse3"/>
    <circle cx="725" cy="79" r="4" fill="#ff8800" opacity="0.6" filter="url(#t-glow)"/>
  </g>
  <!-- Beast symbol: energy core -->
  <circle cx="725" cy="155" r="32" fill="#200a0a" stroke="#ff4466" stroke-width="1.8" opacity="0.7" class="t-pulse3"/>
  <circle cx="725" cy="155" r="22" fill="#280a0a" stroke="#ff4466" stroke-width="1" opacity="0.5"/>
  <circle cx="725" cy="155" r="13" fill="#ff4466" opacity="0.15" filter="url(#t-glow)"/>
  <circle cx="725" cy="155" r="7" fill="#ff4466" opacity="0.5" filter="url(#t-glow)" class="t-pulse3"/>
  <circle cx="725" cy="155" r="4" fill="#ff4466" opacity="0.9" filter="url(#t-glow)"/>
  <!-- Lightning spokes -->
  <g stroke="#ff4466" stroke-width="1.5" opacity="0.5" filter="url(#t-glow)">
    <line x1="725" y1="123" x2="725" y2="100"/>
    <line x1="725" y1="187" x2="725" y2="210"/>
    <line x1="697" y1="131" x2="680" y2="115"/>
    <line x1="753" y1="131" x2="770" y2="115"/>
    <line x1="697" y1="179" x2="680" y2="195"/>
    <line x1="753" y1="179" x2="770" y2="195"/>
  </g>
  <text x="725" y="245" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#ff4466" letter-spacing="2" opacity="0.9">BEAST</text>
  <text x="725" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#ff8800" letter-spacing="1" opacity="0.65">VELOCITY · PRESSURE</text>
  <text x="725" y="277" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#ff4466" opacity="0.5">highest risk · regression driver</text>
</g>
<!-- Bottom label -->
<text x="450" y="308" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#1e3a4a" letter-spacing="4" opacity="0.7">UCB1 MULTI-ARMED BANDIT SELECTION</text>
<!-- Border -->
<rect width="900" height="320" fill="none" stroke="#00d4ff" stroke-width="0.8" rx="12" opacity="0.15"/>
</svg>
