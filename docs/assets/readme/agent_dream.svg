<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="d-bg" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#0d0820"/>
    <stop offset="100%" stop-color="#030108"/>
  </radialGradient>
  <radialGradient id="d-nebula" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.18"/>
    <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
  </radialGradient>
  <filter id="d-glow">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="d-soft">
    <feGaussianBlur stdDeviation="10"/>
  </filter>
  <pattern id="d-stars" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="15" r="0.6" fill="white" opacity="0.4"/>
    <circle cx="35" cy="8" r="0.5" fill="white" opacity="0.3"/>
    <circle cx="25" cy="38" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="45" cy="30" r="0.5" fill="white" opacity="0.3"/>
    <circle cx="5" cy="42" r="0.4" fill="white" opacity="0.4"/>
  </pattern>
  <clipPath id="d-clip">
    <circle cx="200" cy="200" r="185"/>
  </clipPath>
  <linearGradient id="d-ring" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0.9"/>
  </linearGradient>
  <style>
    @keyframes d-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes d-twinkle{0%,100%{opacity:.4}50%{opacity:1}}
    @keyframes d-orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes d-orbit2{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
    @keyframes d-pulse{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes d-wave{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-60}}
    .d-crystal{transform-origin:200px 180px;animation:d-float 4s ease-in-out infinite}
    .d-orb1{transform-origin:200px 200px;animation:d-orbit 10s linear infinite}
    .d-orb2{transform-origin:200px 200px;animation:d-orbit2 15s linear infinite}
    .d-t1{animation:d-twinkle 2s ease-in-out infinite}
    .d-t2{animation:d-twinkle 2.5s ease-in-out infinite 0.8s}
    .d-t3{animation:d-twinkle 3s ease-in-out infinite 1.5s}
    .d-beacon{animation:d-pulse 2s ease-in-out infinite}
    .d-wave{animation:d-wave 3s linear infinite;stroke-dasharray:8 4}
  </style>
</defs>
<circle cx="200" cy="200" r="200" fill="url(#d-bg)"/>
<circle cx="200" cy="200" r="185" fill="url(#d-nebula)"/>
<rect width="400" height="400" fill="url(#d-stars)" clip-path="url(#d-clip)"/>
<!-- Nebula soft glow blobs -->
<circle cx="150" cy="160" r="60" fill="#a855f7" opacity="0.06" filter="url(#d-soft)"/>
<circle cx="260" cy="240" r="50" fill="#00d4ff" opacity="0.07" filter="url(#d-soft)"/>
<circle cx="200" cy="200" r="178" fill="none" stroke="url(#d-ring)" stroke-width="1.5" opacity="0.5"/>
<circle cx="200" cy="200" r="175" fill="none" stroke="#a855f7" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.3"/>
<!-- Orbiting particles -->
<g class="d-orb1">
  <circle cx="200" cy="65" r="6" fill="#a855f7" opacity="0.8" filter="url(#d-glow)" class="d-beacon"/>
  <circle cx="335" cy="200" r="4" fill="#00d4ff" opacity="0.6" filter="url(#d-glow)"/>
</g>
<g class="d-orb2">
  <circle cx="200" cy="80" r="4" fill="#ff4466" opacity="0.6" filter="url(#d-glow)"/>
  <circle cx="320" cy="200" r="3" fill="#a855f7" opacity="0.5" filter="url(#d-glow)"/>
</g>
<!-- Orbit trails -->
<circle cx="200" cy="200" r="135" fill="none" stroke="#a855f7" stroke-width="0.6" stroke-dasharray="3 8" opacity="0.18"/>
<circle cx="200" cy="200" r="120" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="2 10" opacity="0.15"/>
<!-- Crystal/Eye form - center -->
<g class="d-crystal">
  <!-- Outer eye -->
  <ellipse cx="200" cy="180" rx="72" ry="46" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <!-- Iris -->
  <ellipse cx="200" cy="180" rx="36" ry="36" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="180" r="36" fill="#0d0820" opacity="0.8"/>
  <!-- Pupil glow -->
  <circle cx="200" cy="180" r="22" fill="#a855f7" opacity="0.2" filter="url(#d-glow)"/>
  <circle cx="200" cy="180" r="14" fill="#a855f7" opacity="0.35" filter="url(#d-glow)"/>
  <circle cx="200" cy="180" r="7" fill="#a855f7" opacity="0.8" filter="url(#d-glow)" class="d-beacon"/>
  <!-- Cornea reflection -->
  <circle cx="190" cy="170" r="4" fill="white" opacity="0.3"/>
  <!-- Lash-like radiating lines -->
  <line x1="128" y1="180" x2="108" y2="180" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <line x1="272" y1="180" x2="292" y2="180" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="134" x2="200" y2="118" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <line x1="140" y1="145" x2="128" y2="133" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="260" y1="145" x2="272" y2="133" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="140" y1="215" x2="128" y2="227" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="260" y1="215" x2="272" y2="227" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
</g>
<!-- Wave / horizon lines below -->
<g transform="translate(0,240)" clip-path="url(#d-clip)">
  <path d="M50,0 Q125,-20 200,0 Q275,20 350,0" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3" class="d-wave"/>
  <path d="M50,15 Q125,-5 200,15 Q275,35 350,15" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2" class="d-wave"/>
  <path d="M50,30 Q125,10 200,30 Q275,50 350,30" fill="none" stroke="#a855f7" stroke-width="0.6" opacity="0.15"/>
</g>
<!-- Twinkling stars (notable ones) -->
<circle cx="100" cy="100" r="2" fill="white" class="d-t1"/>
<circle cx="300" cy="90" r="1.8" fill="#a855f7" class="d-t2"/>
<circle cx="310" cy="290" r="2" fill="white" class="d-t3"/>
<circle cx="90" cy="300" r="1.5" fill="#00d4ff" class="d-t1"/>
<circle cx="155" cy="75" r="1.5" fill="white" class="d-t2" opacity="0.7"/>
<circle cx="330" cy="170" r="1.8" fill="#a855f7" class="d-t3" opacity="0.8"/>
<!-- Corner accents -->
<g stroke="#a855f7" stroke-width="1.5" fill="none" opacity="0.5">
  <path d="M68,68 L68,88 L88,88"/>
  <path d="M332,68 L332,88 L312,88"/>
  <path d="M68,332 L68,312 L88,312"/>
  <path d="M332,332 L332,312 L312,312"/>
</g>
<!-- Label -->
<rect x="125" y="296" width="150" height="36" rx="18" fill="#0d0820" stroke="#a855f7" stroke-width="1" opacity="0.92"/>
<text x="200" y="312" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#a855f7" letter-spacing="3" opacity="0.9">DREAM</text>
<text x="200" y="325" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#00d4ff" letter-spacing="1.5" opacity="0.7">NOVELTY · EXPLORATION</text>
<circle cx="200" cy="200" r="196" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.15"/>
</svg>
