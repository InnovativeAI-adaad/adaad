<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @keyframes sp{0%,100%{opacity:.8}50%{opacity:1}}
      @keyframes gs{0%{background-position:0%}100%{background-position:200%}}
    </style>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00d4ff" stop-opacity=".15"/><stop offset="100%" stop-color="#a855f7" stop-opacity=".08"/></linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00ff88" stop-opacity=".12"/><stop offset="100%" stop-color="#00d4ff" stop-opacity=".06"/></linearGradient>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5c842" stop-opacity=".12"/><stop offset="100%" stop-color="#ff9500" stop-opacity=".06"/></linearGradient>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a855f7" stop-opacity=".12"/><stop offset="100%" stop-color="#ff4466" stop-opacity=".06"/></linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
    <filter id="gc"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gg"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gy"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gp"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="200" fill="#060a0f"/>
  <!-- Card 1 -->
  <rect x="0" y="0" width="300" height="200" fill="url(#bg1)"/>
  <rect x="0" y="0" width="300" height="5" fill="url(#bar1)"/>
  <g filter="url(#gc)"><text x="150" y="92" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="52" font-weight="900" fill="#00d4ff" letter-spacing="-2" style="animation:sp 5s ease-in-out infinite">v9.48.0</text></g>
  <text x="150" y="128" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="16" fill="rgba(255,255,255,.4)" letter-spacing="3">CURRENT RELEASE</text>
  <text x="150" y="152" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" fill="rgba(255,255,255,.18)">2026-04-04</text>
  <!-- Card 2 -->
  <rect x="301" y="0" width="299" height="200" fill="url(#bg2)"/>
  <rect x="301" y="0" width="299" height="5" fill="#00ff88"/>
  <g filter="url(#gg)"><text x="450" y="92" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="52" font-weight="900" fill="#00ff88" letter-spacing="-2" style="animation:sp 5s .5s ease-in-out infinite">84</text></g>
  <text x="450" y="128" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="16" fill="rgba(255,255,255,.4)" letter-spacing="3">PHASES COMPLETE</text>
  <text x="450" y="152" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" fill="rgba(255,255,255,.18)">⛓ Phase 65 · 🌱 Phase 77 sealed</text>
  <!-- Card 3 -->
  <rect x="601" y="0" width="299" height="200" fill="url(#bg3)"/>
  <rect x="601" y="0" width="299" height="5" fill="#f5c842"/>
  <g filter="url(#gy)"><text x="750" y="92" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="52" font-weight="900" fill="#f5c842" letter-spacing="-2">4,800+</text></g>
  <text x="750" y="128" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="16" fill="rgba(255,255,255,.4)" letter-spacing="3">TESTS PASSING</text>
  <text x="750" y="152" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" fill="rgba(255,255,255,.18)">ledger: 12,441+ · SHA-256</text>
  <!-- Card 4 -->
  <rect x="901" y="0" width="299" height="200" fill="url(#bg4)"/>
  <rect x="901" y="0" width="299" height="5" fill="#a855f7"/>
  <g filter="url(#gp)"><text x="1050" y="92" text-anchor="middle" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="52" font-weight="900" fill="#a855f7" letter-spacing="-2" style="animation:sp 5s 1s ease-in-out infinite">36</text></g>
  <text x="1050" y="128" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="16" fill="rgba(255,255,255,.4)" letter-spacing="3">CONSTITUTIONAL INVARIANTS</text>
  <text x="1050" y="152" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" fill="rgba(255,255,255,.18)">23 supreme rules · v0.9.0</text>
</svg>