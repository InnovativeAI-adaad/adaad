<svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Autonomous evolution is proven by ledger evidence and replay</title>
  <desc id="desc">A governed mutation completes, its hash is chained into evidence, and reproducible replay confirms autonomous evolution as verifiable fact rather than marketing claim.</desc>
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020a18"/>
      <stop offset="100%" stop-color="#031328"/>
    </linearGradient>
  </defs>
  <rect width="420" height="220" rx="18" fill="url(#bg3)"/>
  <rect x="1" y="1" width="418" height="218" rx="17" fill="none" stroke="#00d4ff" opacity="0.28"/>

  <text x="24" y="34" fill="#f5c842" font-family="'Courier New',monospace" font-size="14" font-weight="700" letter-spacing="1.1">PANEL 3 · PROOF</text>
  <text x="24" y="56" fill="#c6d8ea" font-family="'Courier New',monospace" font-size="11">Autonomous evolution, evidenced</text>

  <circle cx="78" cy="112" r="34" fill="#0d1f17" stroke="#00ff88" stroke-width="2"/>
