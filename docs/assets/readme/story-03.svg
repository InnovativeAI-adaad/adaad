  <text x="366" y="121" text-anchor="middle" fill="#8fdfff" font-family="'Courier New',monospace" font-size="9">zero diff</text>

  <rect x="24" y="160" width="372" height="36" rx="8" fill="#0b141f" stroke="#f5c842" opacity="0.9"/>
  <text x="210" y="180" text-anchor="middle" fill="#ffe9a8" font-family="'Courier New',monospace" font-size="10">Result: ADAAD can improve itself with cryptographic evidence you can independently verify.</text>
