  <text x="78" y="121" text-anchor="middle" fill="#8cffc8" font-family="'Courier New',monospace" font-size="10">Applied</text>

  <path d="M114 112 L178 112" stroke="#00ff88" stroke-width="2.4"/>
  <polygon points="178,112 170,107 170,117" fill="#00ff88"/>

  <rect x="184" y="84" width="110" height="56" rx="9" fill="#111522" stroke="#a855f7"/>
  <text x="239" y="106" text-anchor="middle" fill="#d6b4ff" font-family="'Courier New',monospace" font-size="10" font-weight="700">Lineage Ledger</text>
  <text x="239" y="122" text-anchor="middle" fill="#d6b4ff" font-family="'Courier New',monospace" font-size="9">hash-chained proof</text>

  <path d="M296 112 L332 112" stroke="#a855f7" stroke-width="2.2"/>
  <polygon points="332,112 324,107 324,117" fill="#a855f7"/>

  <rect x="336" y="84" width="60" height="56" rx="9" fill="#0b2035" stroke="#00d4ff"/>
