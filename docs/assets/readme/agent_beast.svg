<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="b-bg" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#200a0a"/>
    <stop offset="100%" stop-color="#080202"/>
  </radialGradient>
  <radialGradient id="b-core" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff4466" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#ff4466" stop-opacity="0"/>
  </radialGradient>
  <filter id="b-glow">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="b-hot">
    <feGaussianBlur stdDeviation="12"/>
  </filter>
  <clipPath id="b-clip">
    <circle cx="200" cy="200" r="185"/>
  </clipPath>
  <linearGradient id="b-ring" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff4466" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#ff8800" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#ff4466" stop-opacity="0.9"/>
  </linearGradient>
  <pattern id="b-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <line x1="20" y1="0" x2="0" y2="0" stroke="#ff4466" stroke-width="0.3" opacity="0.1"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#ff4466" stroke-width="0.3" opacity="0.1"/>
  </pattern>
  <style>
    @keyframes b-pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    @keyframes b-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes b-spin2{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
    @keyframes b-charge{0%,100%{stroke-dashoffset:0}50%{stroke-dashoffset:-40}}
    @keyframes b-flare{0%,100%{opacity:.4}50%{opacity:.9}}
    .b-outer{transform-origin:200px 200px;animation:b-spin 8s linear infinite}
    .b-mid{transform-origin:200px 200px;animation:b-spin2 5s linear infinite}
    .b-core-pulse{animation:b-pulse 1.5s ease-in-out infinite}
    .b-charge{stroke-dasharray:12 6;animation:b-charge 1.5s linear infinite}
    .b-flare{animation:b-flare 2s ease-in-out infinite}
  </style>
</defs>
<circle cx="200" cy="200" r="200" fill="url(#b-bg)"/>
<circle cx="200" cy="200" r="185" fill="url(#b-core)"/>
<rect width="400" height="400" fill="url(#b-grid)" clip-path="url(#b-clip)"/>
<!-- Heat haze blobs -->
<circle cx="200" cy="200" r="80" fill="#ff4466" opacity="0.06" filter="url(#b-hot)"/>
<circle cx="160" cy="180" r="40" fill="#ff8800" opacity="0.07" filter="url(#b-hot)"/>
<circle cx="240" cy="220" r="35" fill="#ff4466" opacity="0.06" filter="url(#b-hot)"/>
<!-- Rings -->
<circle cx="200" cy="200" r="178" fill="none" stroke="url(#b-ring)" stroke-width="2" opacity="0.6"/>
<circle cx="200" cy="200" r="173" fill="none" stroke="#ff4466" stroke-width="0.5" stroke-dasharray="4 5" opacity="0.4"/>
<!-- Spinning outer ring -->
<g class="b-outer">
  <circle cx="200" cy="200" r="155" fill="none" stroke="#ff4466" stroke-width="1.5" stroke-dasharray="20 10" opacity="0.3"/>
  <circle cx="355" cy="200" r="7" fill="#ff4466" opacity="0.85" filter="url(#b-glow)"/>
  <circle cx="45" cy="200" r="5" fill="#ff8800" opacity="0.7" filter="url(#b-glow)"/>
</g>
<!-- Middle spinning ring -->
<g class="b-mid">
  <circle cx="200" cy="200" r="120" fill="none" stroke="#ff8800" stroke-width="1" stroke-dasharray="15 8" opacity="0.25"/>
  <circle cx="200" cy="80" r="5" fill="#ff8800" opacity="0.75" filter="url(#b-glow)"/>
  <circle cx="200" cy="320" r="4" fill="#ff4466" opacity="0.6" filter="url(#b-glow)"/>
</g>
<!-- Central power core -->
<g class="b-core-pulse">
  <circle cx="200" cy="200" r="55" fill="#200a0a" stroke="#ff4466" stroke-width="2" opacity="0.8"/>
  <circle cx="200" cy="200" r="42" fill="#280a0a" stroke="#ff4466" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="200" r="28" fill="#ff4466" opacity="0.15" filter="url(#b-glow)"/>
  <circle cx="200" cy="200" r="18" fill="#ff4466" opacity="0.4" filter="url(#b-glow)"/>
  <circle cx="200" cy="200" r="10" fill="#ff4466" opacity="0.9" filter="url(#b-glow)"/>
</g>
<!-- Lightning bolt charges radiating out -->
<g stroke="#ff4466" stroke-width="1.8" fill="none" opacity="0.6" filter="url(#b-glow)" class="b-charge">
  <line x1="200" y1="145" x2="200" y2="80" class="b-flare"/>
  <line x1="200" y1="255" x2="200" y2="320" class="b-flare"/>
  <line x1="148" y1="172" x2="100" y2="140" class="b-flare"/>
  <line x1="252" y1="172" x2="300" y2="140" class="b-flare"/>
  <line x1="148" y1="228" x2="100" y2="260" class="b-flare"/>
  <line x1="252" y1="228" x2="300" y2="260" class="b-flare"/>
</g>
<!-- Lightning-bolt jagged spokes -->
<g stroke="#ff8800" stroke-width="1.2" fill="none" opacity="0.45">
  <polyline points="200,145 196,128 203,118 198,95"/>
  <polyline points="200,255 204,272 197,282 202,305"/>
  <polyline points="148,172 132,162 120,168 98,155"/>
  <polyline points="252,172 268,162 280,168 302,155"/>
</g>
<!-- Diagonal energy slashes -->
<g stroke="#ff4466" stroke-width="2" opacity="0.3" class="b-charge">
  <line x1="120" y1="120" x2="280" y2="280"/>
  <line x1="280" y1="120" x2="120" y2="280"/>
</g>
<!-- Tick marks on inner ring -->
<g stroke="#ff4466" stroke-width="1.2" opacity="0.4">
  <line x1="200" y1="147" x2="200" y2="155"/>
  <line x1="200" y1="245" x2="200" y2="253"/>
  <line x1="148" y1="200" x2="156" y2="200"/>
  <line x1="244" y1="200" x2="252" y2="200"/>
  <line x1="161" y1="161" x2="167" y2="167"/>
  <line x1="239" y1="239" x2="233" y2="233"/>
  <line x1="161" y1="239" x2="167" y2="233"/>
  <line x1="239" y1="161" x2="233" y2="167"/>
</g>
<!-- Danger corner marks -->
<g stroke="#ff4466" stroke-width="2" fill="none" opacity="0.6">
  <path d="M68,68 L68,88 L88,68 Z"/>
  <path d="M332,68 L332,88 L312,68 Z"/>
  <path d="M68,332 L68,312 L88,332 Z"/>
  <path d="M332,332 L332,312 L312,332 Z"/>
</g>
<!-- Label -->
<rect x="130" y="296" width="140" height="36" rx="18" fill="#1a0404" stroke="#ff4466" stroke-width="1" opacity="0.92"/>
<text x="200" y="312" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#ff4466" letter-spacing="4" opacity="0.95">BEAST</text>
<text x="200" y="325" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#ff8800" letter-spacing="1.5" opacity="0.75">VELOCITY · PRESSURE</text>
<circle cx="200" cy="200" r="196" fill="none" stroke="#ff4466" stroke-width="0.5" opacity="0.15"/>
</svg>
