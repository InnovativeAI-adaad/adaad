<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ADAAD Agents Overview</title>
  <desc id="desc">Composite overview of Architect, Dream, and Beast as coordinated mutation agents in ADAAD.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="20" fill="url(#bg)"/>
  <text x="600" y="68" font-size="36" fill="#e5e7eb" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">ADAAD Three-Agent Overview</text>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="90" y="120" width="300" height="220" rx="16" fill="#1f2937" stroke="#34d399"/>
    <text x="240" y="170" font-size="30" fill="#34d399">Architect</text>
    <text x="240" y="210" font-size="18" fill="#d1d5db">Governance strategy</text>
    <text x="240" y="238" font-size="18" fill="#d1d5db">Constitutional planning</text>

    <rect x="450" y="120" width="300" height="220" rx="16" fill="#1f2937" stroke="#60a5fa"/>
    <text x="600" y="170" font-size="30" fill="#60a5fa">Dream</text>
    <text x="600" y="210" font-size="18" fill="#d1d5db">Scenario exploration</text>
    <text x="600" y="238" font-size="18" fill="#d1d5db">Innovation modeling</text>

    <rect x="810" y="120" width="300" height="220" rx="16" fill="#1f2937" stroke="#f97316"/>
    <text x="960" y="170" font-size="30" fill="#f97316">Beast</text>
    <text x="960" y="210" font-size="18" fill="#d1d5db">Execution pressure tests</text>
    <text x="960" y="238" font-size="18" fill="#d1d5db">Mutation delivery</text>
  </g>
  <path d="M390 230 L450 230" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M750 230 L810 230" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
