<svg viewBox="0 0 1440 140" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sc-bg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010810"/>
    <stop offset="50%" stop-color="#020e1c"/>
    <stop offset="100%" stop-color="#010810"/>
  </linearGradient>
  <filter id="sc-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="sc-dots" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.7" fill="#00d4ff" opacity="0.1"/>
  </pattern>
  <style>
    @keyframes sc-glow{0%,100%{opacity:.7}50%{opacity:1}}
    .sc-v{animation:sc-glow 2.5s ease-in-out infinite}
    .sc-t{animation:sc-glow 2.5s ease-in-out infinite .5s}
    .sc-c{animation:sc-glow 2.5s ease-in-out infinite 1s}
    .sc-p{animation:sc-glow 2.5s ease-in-out infinite 1.5s}
    .sc-e{animation:sc-glow 2.5s ease-in-out infinite 2s}
    .sc-i{animation:sc-glow 2.5s ease-in-out infinite .25s}
    .sc-d{animation:sc-glow 2.5s ease-in-out infinite .75s}
    .sc-a{animation:sc-glow 2.5s ease-in-out infinite 1.25s}
    .sc-f{animation:sc-glow 2.5s ease-in-out infinite 1.75s}
  </style>
</defs>
<rect width="1440" height="140" fill="url(#sc-bg)"/>
<rect width="1440" height="140" fill="url(#sc-dots)"/>
<rect x="0" y="0" width="1440" height="1.5" fill="#00d4ff" opacity="0.4"/>
<rect x="0" y="138.5" width="1440" height="1.5" fill="#f5c842" opacity="0.35"/>
<g font-family="'Courier New',monospace" text-anchor="middle">
  <!-- 1: Version -->
  <text x="80" y="48" fill="#f5c842" font-size="26" font-weight="700" filter="url(#sc-glow)" class="sc-v">v9.1.0</text>
  <text x="80" y="68" fill="#f5c842" font-size="7" letter-spacing="2" opacity="0.65">CURRENT VERSION</text>
  <text x="80" y="82" fill="#2a1a00" font-size="7" letter-spacing="1.5" opacity="0.7">Phase 66 Alpha</text>
  <line x1="80" y1="92" x2="80" y2="128" stroke="#f5c842" stroke-width="0.5" opacity="0.2"/>
  <line x1="160" y1="18" x2="160" y2="122" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>

  <!-- 2: Tests -->
  <text x="250" y="48" fill="#00ff88" font-size="26" font-weight="700" filter="url(#sc-glow)" class="sc-t">4,466</text>
  <text x="250" y="68" fill="#00ff88" font-size="7" letter-spacing="2" opacity="0.65">TESTS PASSING</text>
  <text x="250" y="82" fill="#004a18" font-size="7" letter-spacing="1.5" opacity="0.7">zero regressions</text>
  <line x1="340" y1="18" x2="340" y2="122" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>

  <!-- 3: Rules -->
  <text x="430" y="48" fill="#00d4ff" font-size="26" font-weight="700" filter="url(#sc-glow)" class="sc-c">23</text>
  <text x="430" y="68" fill="#00d4ff" font-size="7" letter-spacing="2" opacity="0.65">CONST. RULES</text>
  <text x="430" y="82" fill="#0a2a40" font-size="7" letter-spacing="1.5" opacity="0.7">v0.9.0 · non-bypassable</text>
  <line x1="520" y1="18" x2="520" y2="122" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>

  <!-- 4: CEL Steps -->
  <text x="610" y="48" fill="#f5c842" font-size="26" font-weight="700" filter="url(#sc-glow)" class="sc-p">14</text>
  <text x="610" y="68" fill="#f5c842" font-size="7" letter-spacing="2" opacity="0.65">CEL STEPS</text>
  <text x="610" y="82" fill="#2a1a00" font-size="7" letter-spacing="1.5" opacity="0.7">ordered · CEL-ORDER-0</text>
  <line x1="700" y1="18" x2="700" y2="122" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>

  <!-- 5: Phases -->
  <text x="790" y="48" fill="#a855f7" font-size="26" font-weight="700" filter="url(#sc-glow)" class="sc-e">66</text>
  <text x="790" y="68" fill="#a855f7" font-size="7" letter-spacing="2" opacity="0.65">PHASES COMPLETE</text>
  <text x="790" y="82" fill="#2a0a50" font-size="7" letter-spacing="1.5" opacity="0.7">v1.0 → v9.1.0</text>
  <line x1="880" y1="18" x2="880" y2="122" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>

  <!-- 6: Invariants -->
  <text x="970" y="48" fill="#ff4466" font-size="26" font-weight="700" filter="url(#sc-glow)" class="sc-i">8</text>
  <text x="970" y="68" fill="#ff4466" font-size="7" letter-spacing="2" opacity="0.65">INVARIANTS</text>
  <text x="970" y="82" fill="#400010" font-size="7" letter-spacing="1.5" opacity="0.7">code-level · unoverridable</text>
  <line x1="1060" y1="18" x2="1060" y2="122" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>

  <!-- 7: Divergence -->
  <text x="1150" y="48" fill="#00ff88" font-size="26" font-weight="700" filter="url(#sc-glow)" class="sc-d">0</text>
  <text x="1150" y="68" fill="#00ff88" font-size="7" letter-spacing="2" opacity="0.65">REPLAY DIVERGENCE</text>
  <text x="1150" y="82" fill="#004a18" font-size="7" letter-spacing="1.5" opacity="0.7">DET-ALL-0 · always</text>
  <line x1="1240" y1="18" x2="1240" y2="122" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>

  <!-- 8: Self-evolved -->
  <text x="1360" y="44" fill="#f5c842" font-size="18" font-weight="700" filter="url(#sc-glow)" class="sc-a">⛓ EVOLVED</text>
  <text x="1360" y="62" fill="#f5c842" font-size="7" letter-spacing="1.5" opacity="0.8">PHASE 65</text>
  <text x="1360" y="76" fill="#2a1a00" font-size="7" letter-spacing="1" opacity="0.7">Mar 13 2026</text>
  <text x="1360" y="89" fill="#2a1a00" font-size="6" letter-spacing="1" opacity="0.6">hash in ledger</text>
</g>
</svg>
