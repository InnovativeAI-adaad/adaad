<svg viewBox="0 0 1440 130" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="scbg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#020a18"/>
    <stop offset="50%" stop-color="#030e20"/>
    <stop offset="100%" stop-color="#020a18"/>
  </linearGradient>
  <filter id="scg">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scdots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="#00d4ff" opacity="0.15"/>
  </pattern>
</defs>
<rect width="1440" height="130" fill="url(#scbg)" rx="0"/>
<rect width="1440" height="130" fill="url(#scdots)"/>
<!-- Top + bottom border -->
<rect x="0" y="0" width="1440" height="1.5" fill="#00d4ff" opacity="0.3"/>
<rect x="0" y="128.5" width="1440" height="1.5" fill="#f5c842" opacity="0.25"/>

<!-- 8 stat blocks evenly spaced -->
<g font-family="'Courier New',monospace" text-anchor="middle">
  <!-- 1: v9.1.0 -->
  <text x="90" y="50" fill="#f5c842" font-size="24" font-weight="700" filter="url(#scg)">v9.1.0</text>
  <text x="90" y="72" fill="#1e4460" font-size="9" letter-spacing="2.5">CURRENT VERSION</text>
  <line x1="90" y1="82" x2="90" y2="120" stroke="#f5c842" stroke-width="0.5" opacity="0.2"/>

  <line x1="180" y1="15" x2="180" y2="115" stroke="#1a2a3a" stroke-width="0.8"/>

  <!-- 2: 4,441 -->
  <text x="270" y="50" fill="#00ff88" font-size="24" font-weight="700" filter="url(#scg)">4,441</text>
  <text x="270" y="72" fill="#1a3a28" font-size="9" letter-spacing="2.5">TESTS PASSING</text>

  <line x1="360" y1="15" x2="360" y2="115" stroke="#1a2a3a" stroke-width="0.8"/>

  <!-- 3: 23 -->
  <text x="450" y="50" fill="#00d4ff" font-size="24" font-weight="700" filter="url(#scg)">23</text>
  <text x="450" y="72" fill="#0a2a40" font-size="9" letter-spacing="2.5">CONST. RULES</text>

  <line x1="540" y1="15" x2="540" y2="115" stroke="#1a2a3a" stroke-width="0.8"/>

  <!-- 4: 14 -->
  <text x="630" y="50" fill="#f5c842" font-size="24" font-weight="700" filter="url(#scg)">14</text>
  <text x="630" y="72" fill="#2a2010" font-size="9" letter-spacing="2.5">CEL STEPS</text>

  <line x1="720" y1="15" x2="720" y2="115" stroke="#1a2a3a" stroke-width="0.8"/>

  <!-- 5: 66 -->
  <text x="810" y="50" fill="#a855f7" font-size="24" font-weight="700" filter="url(#scg)">66</text>
  <text x="810" y="72" fill="#1e0a40" font-size="9" letter-spacing="2.5">PHASES DONE</text>

  <line x1="900" y1="15" x2="900" y2="115" stroke="#1a2a3a" stroke-width="0.8"/>

  <!-- 6: 8 -->
  <text x="990" y="50" fill="#ff4466" font-size="24" font-weight="700" filter="url(#scg)">8</text>
  <text x="990" y="72" fill="#2a0010" font-size="9" letter-spacing="2.5">INVARIANTS</text>

  <line x1="1080" y1="15" x2="1080" y2="115" stroke="#1a2a3a" stroke-width="0.8"/>

  <!-- 7: 329 -->
  <text x="1170" y="50" fill="#00d4ff" font-size="24" font-weight="700" filter="url(#scg)">329</text>
  <text x="1170" y="72" fill="#0a2030" font-size="9" letter-spacing="2.5">RUNTIME FILES</text>

  <line x1="1260" y1="15" x2="1260" y2="115" stroke="#1a2a3a" stroke-width="0.8"/>

  <!-- 8: Phase 65 -->
  <text x="1350" y="44" fill="#00ff88" font-size="16" font-weight="700" filter="url(#scg)">PHASE 65</text>
  <text x="1350" y="62" fill="#00ff88" font-size="11" letter-spacing="1">SELF-EVOLVED</text>
  <circle cx="1350" cy="82" r="5" fill="#00ff88" opacity="0.8" filter="url(#scg)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</g>
</svg>
