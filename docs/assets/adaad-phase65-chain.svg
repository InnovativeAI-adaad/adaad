<svg viewBox="0 0 1440 200" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New',monospace">
<defs>
  <linearGradient id="c65-bg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010810"/>
    <stop offset="25%" stop-color="#001508"/>
    <stop offset="75%" stop-color="#001508"/>
    <stop offset="100%" stop-color="#010810"/>
  </linearGradient>
  <radialGradient id="c65-glow-b3" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </radialGradient>
  <filter id="c65-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="c65-glow-sm"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="c65-soft"><feGaussianBlur stdDeviation="20"/></filter>
  <pattern id="c65-dots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.6" fill="#00ff88" opacity="0.06"/>
  </pattern>
  <style>
    @keyframes c65-chain{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-45}}
    @keyframes c65-pulse{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes c65-sealed{0%,100%{opacity:.8}50%{opacity:1}}
    @keyframes c65-scan{0%{transform:translateY(-60px)}100%{transform:translateY(260px)}}
    .c65-chain{stroke-dasharray:12 6;animation:c65-chain 2.5s linear infinite}
    .c65-pulse{animation:c65-pulse 2s ease-in-out infinite}
    .c65-sealed{animation:c65-sealed 1.8s ease-in-out infinite}
    .c65-scan{animation:c65-scan 4s linear infinite;opacity:.04}
  </style>
</defs>
<rect width="1440" height="200" fill="url(#c65-bg)"/>
<rect width="1440" height="200" fill="url(#c65-dots)"/>
<rect x="0" y="0" width="1440" height="1.5" fill="#00ff88" opacity="0.2"/>
<rect x="0" y="198.5" width="1440" height="1.5" fill="#00ff88" opacity="0.1"/>

<!-- Soft glow behind block 3 -->
