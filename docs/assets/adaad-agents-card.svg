<svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="ac-bg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#010810"/>
    <stop offset="25%"  stop-color="#001828"/>
    <stop offset="50%"  stop-color="#0d0820"/>
    <stop offset="75%"  stop-color="#1a0404"/>
    <stop offset="100%" stop-color="#010810"/>
  </linearGradient>
  <filter id="ac-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    @keyframes ac-pulse{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes ac-flow{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-30}}
    .ac-a{animation:ac-pulse 2.5s ease-in-out infinite}
    .ac-d{animation:ac-pulse 2.5s ease-in-out infinite .8s}
    .ac-b{animation:ac-pulse 2.5s ease-in-out infinite 1.6s}
    .ac-flow{stroke-dasharray:6 4;animation:ac-flow 2s linear infinite}
  </style>
</defs>
<rect width="1440" height="100" fill="url(#ac-bg)"/>
<!-- Top/bottom borders -->
<rect x="0" y="0" width="1440" height="1.5" fill="#00d4ff" opacity="0.35"/>
<rect x="0" y="98.5" width="1440" height="1.5" fill="#f5c842" opacity="0.3"/>
<!-- Section separators -->
<line x1="480" y1="15" x2="480" y2="85" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>
<line x1="960" y1="15" x2="960" y2="85" stroke="#1a2a3a" stroke-width="0.8" opacity="0.7"/>
<!-- Architect panel -->
<g>
  <circle cx="75" cy="50" r="28" fill="#001828" stroke="#00d4ff" stroke-width="1.5" opacity="0.8" class="ac-a"/>
  <circle cx="75" cy="50" r="18" fill="#000d18" opacity="0.9"/>
  <rect x="66" y="36" width="18" height="28" rx="1" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <polygon points="75,28 83,36 67,36" fill="none" stroke="#f5c842" stroke-width="1.2" opacity="0.85"/>
  <circle cx="75" cy="30" r="3" fill="#f5c842" opacity="0.9" filter="url(#ac-glow)" class="ac-a"/>
  <text x="130" y="36" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#00d4ff" letter-spacing="2" opacity="0.95">ARCHITECT</text>
  <text x="130" y="52" font-family="'Courier New',monospace" font-size="8" fill="#1e4060" opacity="0.85">Governance-safe structural design · low risk 0.1–0.4</text>
  <text x="130" y="66" font-family="'Courier New',monospace" font-size="8" fill="#1e4060" opacity="0.75">Owns Tier-0 guard decisions · constitutional compliance</text>
  <text x="130" y="80" font-family="'Courier New',monospace" font-size="7.5" fill="#0a5060" opacity="0.65">UCB1 arm α · AST validity · signature verification · scope enforcement</text>
</g>
<!-- Dream panel -->
<g>
  <circle cx="555" cy="50" r="28" fill="#0d0820" stroke="#a855f7" stroke-width="1.5" opacity="0.8" class="ac-d"/>
  <circle cx="555" cy="50" r="18" fill="#080515" opacity="0.9"/>
  <ellipse cx="555" cy="50" rx="14" ry="9" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
  <circle cx="555" cy="50" r="6" fill="#a855f7" opacity="0.3" filter="url(#ac-glow)"/>
  <circle cx="555" cy="50" r="3" fill="#a855f7" opacity="0.8" filter="url(#ac-glow)" class="ac-d"/>
  <text x="610" y="36" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#a855f7" letter-spacing="2" opacity="0.95">DREAM</text>
  <text x="610" y="52" font-family="'Courier New',monospace" font-size="8" fill="#4a1870" opacity="0.85">High-novelty exploration · high expected gain 0.5–0.9</text>
  <text x="610" y="66" font-family="'Courier New',monospace" font-size="8" fill="#4a1870" opacity="0.75">Sees 200 epochs ahead · experimental and behavioral mutations</text>
  <text x="610" y="80" font-family="'Courier New',monospace" font-size="7.5" fill="#2a0a50" opacity="0.65">UCB1 arm β → Thompson sampling after ≥30 non-stationary epochs</text>
</g>
<!-- Beast panel -->
<g>
  <circle cx="1035" cy="50" r="28" fill="#1a0404" stroke="#ff4466" stroke-width="1.5" opacity="0.8" class="ac-b"/>
  <circle cx="1035" cy="50" r="18" fill="#100202" opacity="0.9"/>
  <circle cx="1035" cy="50" r="10" fill="#ff4466" opacity="0.12" filter="url(#ac-glow)"/>
  <circle cx="1035" cy="50" r="6" fill="#ff4466" opacity="0.4" filter="url(#ac-glow)" class="ac-b"/>
  <circle cx="1035" cy="50" r="3" fill="#ff4466" opacity="0.9" filter="url(#ac-glow)"/>
  <line x1="1035" y1="32" x2="1035" y2="26" stroke="#ff4466" stroke-width="1.5" opacity="0.6" filter="url(#ac-glow)"/>
  <line x1="1035" y1="68" x2="1035" y2="74" stroke="#ff4466" stroke-width="1.5" opacity="0.6" filter="url(#ac-glow)"/>
  <text x="1090" y="36" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#ff4466" letter-spacing="4" opacity="0.95">BEAST</text>
  <text x="1090" y="52" font-family="'Courier New',monospace" font-size="8" fill="#601020" opacity="0.85">Mutation velocity at the constitutional edge · highest risk</text>
  <text x="1090" y="66" font-family="'Courier New',monospace" font-size="8" fill="#601020" opacity="0.75">Drives fitness regression targets hard · pressure testing</text>
  <text x="1090" y="80" font-family="'Courier New',monospace" font-size="7.5" fill="#400010" opacity="0.65">UCB1 arm γ · gate filters aggressively · zero blast radius in Tier-2</text>
</g>
<!-- Flow arrows between agents -->
<line x1="395" y1="50" x2="448" y2="50" stroke="#00d4ff" stroke-width="1" opacity="0.3" class="ac-flow"/>
<line x1="877" y1="50" x2="930" y2="50" stroke="#ff4466" stroke-width="1" opacity="0.3" class="ac-flow"/>
<polygon points="444,46 454,50 444,54" fill="#00d4ff" opacity="0.3"/>
<polygon points="926,46 936,50 926,54" fill="#ff4466" opacity="0.3"/>
</svg>
