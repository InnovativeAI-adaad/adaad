<svg viewBox="0 0 1440 560" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="h-bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#010810"/>
    <stop offset="50%" stop-color="#020d1c"/>
    <stop offset="100%" stop-color="#010810"/>
  </linearGradient>
  <radialGradient id="h-glow1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="h-glow2" cx="30%" cy="60%" r="40%">
    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="h-glow3" cx="70%" cy="40%" r="35%">
    <stop offset="0%" stop-color="#f5c842" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
  </radialGradient>
  <filter id="h-blur"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="h-title"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="h-soft"><feGaussianBlur stdDeviation="20"/></filter>
  <filter id="h-xsoft"><feGaussianBlur stdDeviation="50"/></filter>
  <pattern id="h-hex" x="0" y="0" width="52" height="60" patternUnits="userSpaceOnUse">
    <polygon points="26,2 48,14 48,46 26,58 4,46 4,14" fill="none" stroke="#00d4ff" stroke-width="0.35" opacity="0.1"/>
  </pattern>
  <pattern id="h-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#00d4ff" opacity="0.14"/>
  </pattern>
  <style>
    @keyframes h-scan{0%{transform:translateY(-160px)}100%{transform:translateY(720px)}}
    @keyframes h-orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes h-orbit2{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
    @keyframes h-pulse{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes h-blink{0%,100%{opacity:1}48%{opacity:.15}52%{opacity:.9}}
    @keyframes h-trail{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-80}}
    @keyframes h-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .h-scan-line{animation:h-scan 6s linear infinite}
    .h-orbit1{transform-origin:720px 280px;animation:h-orbit 18s linear infinite}
    .h-orbit2{transform-origin:720px 280px;animation:h-orbit2 12s linear infinite}
    .h-orbit3{transform-origin:720px 280px;animation:h-orbit 28s linear infinite}
    .h-beacon{animation:h-pulse 2.5s ease-in-out infinite}
    .h-blink{animation:h-blink 1.2s ease-in-out infinite}
    .h-trail{stroke-dasharray:20 10;animation:h-trail 3s linear infinite}
    .h-float{animation:h-float 4s ease-in-out infinite}
    .h-pulse2{animation:h-pulse 3s ease-in-out infinite 1s}
    .h-pulse3{animation:h-pulse 3.5s ease-in-out infinite 2s}
  </style>
</defs>
<!-- Base -->
<rect width="1440" height="560" fill="url(#h-bg)"/>
<rect width="1440" height="560" fill="url(#h-glow1)"/>
<rect width="1440" height="560" fill="url(#h-glow2)"/>
<rect width="1440" height="560" fill="url(#h-glow3)"/>
<rect width="1440" height="560" fill="url(#h-hex)"/>
<rect width="1440" height="560" fill="url(#h-dots)" opacity="0.5"/>
<!-- Deep background orbs -->
<circle cx="720" cy="280" r="300" fill="#00d4ff" opacity="0.04" filter="url(#h-xsoft)"/>
<circle cx="300" cy="400" r="200" fill="#a855f7" opacity="0.04" filter="url(#h-xsoft)"/>
<circle cx="1100" cy="160" r="180" fill="#f5c842" opacity="0.04" filter="url(#h-xsoft)"/>
<!-- Scanning line -->
<rect x="0" y="0" width="1440" height="2" fill="url(#h-glow1)" opacity="0.3" class="h-scan-line"/>
<!-- Orbit rings -->
<g class="h-orbit1">
  <ellipse cx="720" cy="280" rx="320" ry="95" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.12" transform="rotate(-15,720,280)"/>
  <circle cx="1040" cy="280" r="7" fill="#00d4ff" opacity="0.75" filter="url(#h-blur)" class="h-beacon"/>
</g>
<g class="h-orbit2">
  <ellipse cx="720" cy="280" rx="260" ry="78" fill="none" stroke="#a855f7" stroke-width="0.7" opacity="0.1" transform="rotate(25,720,280)"/>
  <circle cx="720" cy="202" r="5" fill="#a855f7" opacity="0.7" filter="url(#h-blur)" class="h-pulse2"/>
</g>
<g class="h-orbit3">
  <ellipse cx="720" cy="280" rx="200" ry="60" fill="none" stroke="#f5c842" stroke-width="0.6" opacity="0.08" transform="rotate(-40,720,280)"/>
  <circle cx="520" cy="280" r="4" fill="#f5c842" opacity="0.65" filter="url(#h-blur)" class="h-pulse3"/>
</g>
<!-- Central circuit / governance node -->
<circle cx="720" cy="280" r="48" fill="#001828" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
<circle cx="720" cy="280" r="38" fill="#000d1a" stroke="#f5c842" stroke-width="1" opacity="0.5"/>
<circle cx="720" cy="280" r="26" fill="#f5c842" opacity="0.08" filter="url(#h-blur)"/>
<circle cx="720" cy="280" r="16" fill="#f5c842" opacity="0.25" filter="url(#h-blur)" class="h-beacon"/>
<text x="720" y="276" text-anchor="middle" font-family="'Courier New',monospace" font-size="6.5" fill="#f5c842" opacity="0.9" letter-spacing="1">GOV</text>
<text x="720" y="287" text-anchor="middle" font-family="'Courier New',monospace" font-size="6.5" fill="#f5c842" opacity="0.9" letter-spacing="1">GATE</text>
<!-- Spoke lines from center to agents -->
<line x1="720" y1="280" x2="310" y2="180" stroke="#00d4ff" stroke-width="0.8" opacity="0.2" class="h-trail"/>
<line x1="720" y1="280" x2="1130" y2="180" stroke="#a855f7" stroke-width="0.8" opacity="0.2" class="h-trail"/>
<line x1="720" y1="280" x2="310" y2="380" stroke="#ff4466" stroke-width="0.8" opacity="0.15" class="h-trail"/>
<line x1="720" y1="280" x2="1130" y2="380" stroke="#00ff88" stroke-width="0.8" opacity="0.15" class="h-trail"/>
<!-- Blueprint structure lines -->
<g stroke="#00d4ff" stroke-width="0.4" opacity="0.08">
  <line x1="0" y1="140" x2="1440" y2="140"/>
  <line x1="0" y1="280" x2="1440" y2="280"/>
  <line x1="0" y1="420" x2="1440" y2="420"/>
  <line x1="240" y1="0" x2="240" y2="560"/>
  <line x1="720" y1="0" x2="720" y2="560"/>
  <line x1="1200" y1="0" x2="1200" y2="560"/>
</g>
<!-- Left agent node (Architect) -->
<g class="h-float" style="transform-origin:280px 165px">
  <circle cx="280" cy="165" r="28" fill="#001828" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="280" cy="165" r="20" fill="#000d1a" opacity="0.9"/>
  <rect x="271" y="150" width="18" height="30" rx="1" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <polygon points="280,140 288,150 272,150" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.75"/>
  <circle cx="280" cy="140" r="3" fill="#f5c842" opacity="0.9" filter="url(#h-blur)" class="h-beacon"/>
  <text x="280" y="213" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00d4ff" opacity="0.8" letter-spacing="2">ARCHITECT</text>
</g>
<!-- Right agent node (Dream) -->
<g class="h-float" style="transform-origin:1160px 165px;animation-delay:1.3s">
  <circle cx="1160" cy="165" r="28" fill="#0d0820" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
  <circle cx="1160" cy="165" r="20" fill="#080515" opacity="0.9"/>
  <ellipse cx="1160" cy="165" rx="18" ry="11" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
  <circle cx="1160" cy="165" r="7" fill="#a855f7" opacity="0.3" filter="url(#h-blur)"/>
  <circle cx="1160" cy="165" r="4" fill="#a855f7" opacity="0.7" filter="url(#h-blur)" class="h-pulse2"/>
  <text x="1160" y="213" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#a855f7" opacity="0.8" letter-spacing="2">DREAM</text>
</g>
<!-- Bottom-left agent (Beast) -->
<g class="h-float" style="transform-origin:280px 395px;animation-delay:2.1s">
  <circle cx="280" cy="395" r="28" fill="#1a0404" stroke="#ff4466" stroke-width="1.5" opacity="0.8"/>
  <circle cx="280" cy="395" r="20" fill="#100202" opacity="0.9"/>
  <circle cx="280" cy="395" r="12" fill="#ff4466" opacity="0.1" filter="url(#h-blur)"/>
  <circle cx="280" cy="395" r="7" fill="#ff4466" opacity="0.4" filter="url(#h-blur)" class="h-pulse3"/>
  <circle cx="280" cy="395" r="4" fill="#ff4466" opacity="0.85" filter="url(#h-blur)" class="h-blink"/>
  <text x="280" y="443" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#ff4466" opacity="0.8" letter-spacing="4">BEAST</text>
</g>
<!-- Main title block -->
<text x="720" y="90" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#1e3a4a" letter-spacing="8" opacity="0.6">CONSTITUTIONALLY GOVERNED CODE EVOLUTION</text>
<!-- ADAAD lettering -->
<text x="720" y="162" text-anchor="middle" font-family="'Courier New',monospace" font-size="86" font-weight="900" fill="#00d4ff" letter-spacing="16" opacity="0.06">ADAAD</text>
<text x="722" y="160" text-anchor="middle" font-family="'Courier New',monospace" font-size="82" font-weight="900" fill="none" stroke="#00d4ff" stroke-width="0.8" letter-spacing="16" opacity="0.25" filter="url(#h-title)">ADAAD</text>
<text x="720" y="158" text-anchor="middle" font-family="'Courier New',monospace" font-size="80" font-weight="900" fill="#00d4ff" letter-spacing="16" opacity="0.9" filter="url(#h-title)">ADAAD</text>
<!-- Subtitle -->
<text x="720" y="195" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#f5c842" letter-spacing="3" opacity="0.85">Autonomous Development &amp; Adaptation Architecture</text>
<!-- Tag line -->
<text x="720" y="230" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#00d4ff" letter-spacing="2" opacity="0.55">GovernanceGate · 23 Rules · SHA-256 Hash-Chain · Deterministic Replay</text>
<!-- Status bar bottom -->
<rect x="0" y="490" width="1440" height="70" fill="#000810" opacity="0.9"/>
<line x1="0" y1="490" x2="1440" y2="490" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
<!-- Status items -->
<g font-family="'Courier New',monospace" font-size="8.5">
  <circle cx="70" cy="525" r="5" fill="#00ff88" opacity="0.9" class="h-beacon"/>
  <text x="85" y="521" fill="#00ff88" opacity="0.85" letter-spacing="1">EVOLUTION LOOP</text>
  <text x="85" y="535" fill="#1a4a28" opacity="0.8">14-STEP · CEL-ORDER-0</text>

  <circle cx="280" cy="525" r="5" fill="#00ff88" opacity="0.9" class="h-pulse2"/>
  <text x="295" y="521" fill="#00ff88" opacity="0.85" letter-spacing="1">GOVERNANCEGATE</text>
  <text x="295" y="535" fill="#1a4a28" opacity="0.8">NON-BYPASSABLE · GOV-SOLE-0</text>

  <circle cx="530" cy="525" r="5" fill="#00ff88" opacity="0.9" class="h-pulse3"/>
  <text x="545" y="521" fill="#00ff88" opacity="0.85" letter-spacing="1">EVIDENCE LEDGER</text>
  <text x="545" y="535" fill="#1a4a28" opacity="0.8">HASH-CHAINED · APPEND-ONLY</text>

  <circle cx="780" cy="525" r="5" fill="#f5c842" opacity="0.9" class="h-beacon"/>
  <text x="795" y="521" fill="#f5c842" opacity="0.85" letter-spacing="1">SELF-EVOLUTION</text>
  <text x="795" y="535" fill="#4a3a00" opacity="0.8">PHASE 65 · MARCH 13 2026</text>

  <circle cx="1000" cy="525" r="5" fill="#00d4ff" opacity="0.9" class="h-pulse2"/>
  <text x="1015" y="521" fill="#00d4ff" opacity="0.85" letter-spacing="1">REPLAY VERIFIER</text>
  <text x="1015" y="535" fill="#0a2a40" opacity="0.8">ZERO DIVERGENCE · DET-ALL-0</text>

  <circle cx="1230" cy="525" r="5" fill="#a855f7" opacity="0.9" class="h-pulse3"/>
  <text x="1245" y="521" fill="#a855f7" opacity="0.85" letter-spacing="1">AGENTS</text>
  <text x="1245" y="535" fill="#2a0a50" opacity="0.8">3 ACTIVE · UCB1 BANDIT</text>
</g>
<!-- Top/bottom border glow -->
<rect x="0" y="0" width="1440" height="2" fill="#00d4ff" opacity="0.4"/>
<rect x="0" y="558" width="1440" height="2" fill="#f5c842" opacity="0.3"/>
<!-- Corner markers -->
<g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4">
  <path d="M20,20 L20,50 L50,50"/>
  <path d="M1420,20 L1420,50 L1390,50"/>
  <path d="M20,540 L20,510 L50,510"/>
  <path d="M1420,540 L1420,510 L1390,510"/>
</g>
<!-- Version badge -->
<rect x="1300" y="15" width="120" height="28" rx="14" fill="#001828" stroke="#00d4ff" stroke-width="1" opacity="0.85"/>
<text x="1360" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00d4ff" letter-spacing="1" opacity="0.9">v9.1.0</text>
<text x="1360" y="37" text-anchor="middle" font-family="'Courier New',monospace" font-size="6.5" fill="#0a3a5a" opacity="0.8">Phase 66 · Alpha</text>
</svg>
