<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .logo-text { font-family:'Inter',Arial,sans-serif;font-weight:900;font-size:72px;letter-spacing:-2px; }
      .logo-sub  { font-family:'Inter',Arial,sans-serif;font-weight:400;font-size:15px;letter-spacing:3px; }
      .pill-text { font-family:'Inter',Arial,sans-serif;font-weight:700;font-size:8px;letter-spacing:1.5px; }
      .node-lbl  { font-family:'Inter',Arial,sans-serif;font-weight:600;font-size:9px;fill:#8c919b;letter-spacing:1px; }
      .gate-lbl  { font-family:'Inter',Arial,sans-serif;font-weight:700;font-size:10px;fill:#f5f7fa;letter-spacing:1px; }
      .gate-sub  { font-family:'Inter',Arial,sans-serif;font-weight:400;font-size:7.5px;fill:#8c919b; }
      .stat-num  { font-family:'Inter',Arial,sans-serif;font-weight:700;font-size:14px;fill:#f5f7fa; }
      .stat-lbl  { font-family:'Inter',Arial,sans-serif;font-weight:400;font-size:8px;fill:#8c919b;letter-spacing:1px; }
      .hash-text { font-family:'JetBrains Mono','Courier New',monospace;font-size:7.5px;fill:#2b2f36; }
      .hash-live { font-family:'JetBrains Mono','Courier New',monospace;font-size:7.5px;fill:#14b8a6; }
      .corner-tx { font-family:'JetBrains Mono','Courier New',monospace;font-size:7px;fill:#2b2f36; }

      @keyframes gridShimmer{0%{opacity:.04}50%{opacity:.09}100%{opacity:.04}}
      .grid{animation:gridShimmer 8s ease-in-out infinite}

      @keyframes chainFlow{0%{stroke-dashoffset:60;opacity:.3}50%{opacity:.8}100%{stroke-dashoffset:0;opacity:.3}}
      .chain-b{stroke:#3b82f6;stroke-width:1.5;fill:none;stroke-dasharray:6 4;animation:chainFlow 2.5s linear infinite}
      .chain-v{stroke:#8b5cf6;stroke-width:1.5;fill:none;stroke-dasharray:4 5;animation:chainFlow 3s linear infinite reverse}
      .chain-o{stroke:#f97316;stroke-width:1.5;fill:none;stroke-dasharray:5 4;animation:chainFlow 2.8s linear infinite}
      .chain-g{stroke:#22c55e;stroke-width:1.2;fill:none;stroke-dasharray:4 4;animation:chainFlow 2s linear infinite}

      @keyframes orbB{0%,100%{r:36;opacity:.12}50%{r:48;opacity:.05}}
      @keyframes orbV{0%,100%{r:36;opacity:.12}50%{r:48;opacity:.05}}
      @keyframes orbO{0%,100%{r:36;opacity:.12}50%{r:48;opacity:.05}}
      .glow-b{fill:#3b82f6;animation:orbB 3s ease-in-out infinite}
      .glow-v{fill:#8b5cf6;animation:orbV 3.4s ease-in-out .5s infinite}
      .glow-o{fill:#f97316;animation:orbO 2.8s ease-in-out 1s infinite}

      @keyframes gRing1{0%,100%{r:30;stroke-opacity:.7;stroke-width:1.5}50%{r:40;stroke-opacity:.1;stroke-width:.5}}
      @keyframes gRing2{0%,100%{r:40;stroke-opacity:.35;stroke-width:1}50%{r:52;stroke-opacity:.05;stroke-width:.3}}
      .gate-r1{fill:none;stroke:#22c55e;animation:gRing1 2s ease-in-out infinite}
      .gate-r2{fill:none;stroke:#22c55e;animation:gRing2 2s ease-in-out .6s infinite}

      @keyframes blink{0%,90%,100%{opacity:1}95%{opacity:.2}}
      .blink{animation:blink 3s ease-in-out infinite}

      @keyframes borderSweep{0%{stroke-dashoffset:1200}100%{stroke-dashoffset:0}}
      .bsweep{fill:none;stroke:#3b82f6;stroke-width:1.5;stroke-dasharray:1200;animation:borderSweep 3s linear forwards}
      .bsweepv{fill:none;stroke:#8b5cf6;stroke-width:.8;stroke-dasharray:600;animation:borderSweep 4s linear 1s forwards;opacity:.5}

      @keyframes ledIn{0%{opacity:0;transform:translateX(-4px)}20%{opacity:1;transform:translateX(0)}80%{opacity:1}100%{opacity:.55}}
      .led1{animation:ledIn 4s ease-in-out infinite}
      .led2{animation:ledIn 4s ease-in-out 1.3s infinite}
      .led3{animation:ledIn 4s ease-in-out 2.6s infinite}

      @keyframes pillBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
      .pill{animation:pillBounce 3s ease-in-out infinite}

      @keyframes pkt{0%{offset-distance:0%;opacity:0}10%{opacity:1}90%{opacity:1}100%{offset-distance:100%;opacity:0}}
      .pktB{fill:#3b82f6;offset-path:path("M 500,175 L 540,200");animation:pkt 2.5s linear infinite}
      .pktV{fill:#8b5cf6;offset-path:path("M 560,175 L 560,200");animation:pkt 3s linear .6s infinite}
      .pktO{fill:#f97316;offset-path:path("M 620,175 L 580,200");animation:pkt 2.8s linear 1.2s infinite}
    </style>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0b0c0f"/>
      <stop offset="60%"  stop-color="#0d0f14"/>
      <stop offset="100%" stop-color="#0b0c0f"/>
    </linearGradient>
    <linearGradient id="hdrG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity=".12"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity=".10"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f5f7fa"/>
      <stop offset="75%"  stop-color="#c8cdd6"/>
      <stop offset="100%" stop-color="#8c919b"/>
    </linearGradient>
    <linearGradient id="barG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity=".7"/>
      <stop offset="50%"  stop-color="#8b5cf6" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity=".3"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowV" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity=".3"/><stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowO" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity=".3"/><stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity=".25"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gateG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a2a1a"/><stop offset="100%" stop-color="#111811"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r=".7" fill="#f5f7fa" opacity=".12"/>
    </pattern>
  </defs>

