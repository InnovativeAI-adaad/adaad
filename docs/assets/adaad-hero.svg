<svg viewBox="0 0 1400 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes scan { 0%{transform:translateY(-200px)} 100%{transform:translateY(700px)} }
    @keyframes flicker { 0%,100%{opacity:.9} 48%{opacity:.45} 52%{opacity:.7} }
    @keyframes breathe { 0%,100%{opacity:.06} 50%{opacity:.18} }
    @keyframes beacon { 0%,100%{r:5;opacity:1} 50%{r:8;opacity:.5} }
    @keyframes beacon2 { 0%,100%{r:4;opacity:1} 50%{r:7;opacity:.4} }
    @keyframes goldpulse { 0%,100%{opacity:.9} 50%{opacity:.35} }
    @keyframes cyanpulse { 0%,100%{opacity:.85} 50%{opacity:.3} }
    @keyframes greenpulse { 0%,100%{opacity:.95} 50%{opacity:.5} }
    @keyframes shimmer { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-40} }
  </style>

  <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1.1" fill="#00d4ff" opacity="0.2"/>
  </pattern>
  <pattern id="finegrid" width="70" height="70" patternUnits="userSpaceOnUse">
    <path d="M70 0L0 0 0 70" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.11"/>
  </pattern>

  <filter id="gs">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gm">
    <feGaussianBlur stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gxl">
    <feGaussianBlur stdDeviation="20" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gred">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#010306"/>
    <stop offset="30%" stop-color="#030d1c"/>
    <stop offset="65%" stop-color="#020a12"/>
    <stop offset="100%" stop-color="#010306"/>
  </linearGradient>
  <radialGradient id="cglow" cx="50%" cy="50%" r="42%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1">
      <animate attributeName="stop-opacity" values="0.1;0.2;0.1" dur="5s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="lglow" cx="15%" cy="50%" r="35%">
    <stop offset="0%" stop-color="#f5c842" stop-opacity="0.09"/>
    <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rglow" cx="88%" cy="50%" r="32%">
    <stop offset="0%" stop-color="#ff4466" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#ff4466" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="cyang" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#006688"/>
    <stop offset="40%" stop-color="#00e8ff"/>
    <stop offset="60%" stop-color="#00e8ff"/>
    <stop offset="100%" stop-color="#006688"/>
  </linearGradient>
  <linearGradient id="goldg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#5a3a00"/>
    <stop offset="40%" stop-color="#f5c842"/>
    <stop offset="60%" stop-color="#f5c842"/>
    <stop offset="100%" stop-color="#5a3a00"/>
  </linearGradient>
  <linearGradient id="titleg" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00f0ff"/>
    <stop offset="55%" stop-color="#00c8f0"/>
    <stop offset="100%" stop-color="#007aaa"/>
  </linearGradient>
  <linearGradient id="scanfade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="vlr" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010306" stop-opacity="0.92"/>
    <stop offset="11%" stop-color="#010306" stop-opacity="0"/>
    <stop offset="89%" stop-color="#010306" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010306" stop-opacity="0.92"/>
  </linearGradient>
  <linearGradient id="vtb" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#010306" stop-opacity="0.7"/>
    <stop offset="14%" stop-color="#010306" stop-opacity="0"/>
    <stop offset="86%" stop-color="#010306" stop-opacity="0"/>
    <stop offset="100%" stop-color="#010306" stop-opacity="0.75"/>
  </linearGradient>

  <clipPath id="clip">
    <rect width="1400" height="500"/>
  </clipPath>
</defs>

<!-- BG -->
<rect width="1400" height="500" fill="url(#bg)"/>
<rect width="1400" height="500" fill="url(#dots)"/>
<rect width="1400" height="500" fill="url(#finegrid)" opacity="0.55"/>
<rect width="1400" height="500" fill="url(#cglow)"/>
<rect width="1400" height="500" fill="url(#lglow)"/>
<rect width="1400" height="500" fill="url(#rglow)"/>

<!-- Scan line -->
<g clip-path="url(#clip)">
  <rect x="0" y="0" width="1400" height="200" fill="url(#scanfade)">
    <animateTransform attributeName="transform" type="translate" values="0,-200;0,700" dur="7s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- Vignette -->
<rect width="1400" height="500" fill="url(#vlr)"/>
<rect width="1400" height="500" fill="url(#vtb)"/>

<!-- Borders -->
<rect x="0" y="0" width="1400" height="2" fill="url(#cyang)" opacity="0.7"/>
<rect x="0" y="498" width="1400" height="2" fill="url(#goldg)" opacity="0.6"/>

<!-- Top ornament -->
<line x1="70" y1="26" x2="600" y2="26" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
<line x1="70" y1="30" x2="400" y2="30" stroke="#00d4ff" stroke-width="0.3" opacity="0.15"/>
<polygon points="700,16 712,26 700,36 688,26" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.9" filter="url(#gs)">
  <animate attributeName="stroke-opacity" values="0.9;0.35;0.9" dur="3.5s" repeatCount="indefinite"/>
</polygon>
<polygon points="700,19 710,26 700,33 690,26" fill="#f5c842" opacity="0.55"/>
<line x1="800" y1="26" x2="1330" y2="26" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
<line x1="1000" y1="30" x2="1330" y2="30" stroke="#00d4ff" stroke-width="0.3" opacity="0.15"/>

<!-- Bottom ornament -->
<line x1="70" y1="474" x2="600" y2="474" stroke="#00d4ff" stroke-width="0.6" opacity="0.28"/>
<polygon points="700,464 712,474 700,484 688,474" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.75" filter="url(#gs)"/>
<polygon points="700,467 710,474 700,481 690,474" fill="#f5c842" opacity="0.4"/>
<line x1="800" y1="474" x2="1330" y2="474" stroke="#00d4ff" stroke-width="0.6" opacity="0.28"/>

<!-- Corner chrome -->
<g filter="url(#gs)" opacity="0.8">
  <line x1="22" y1="22" x2="65" y2="22" stroke="#00d4ff" stroke-width="2"/>
  <line x1="22" y1="22" x2="22" y2="65" stroke="#00d4ff" stroke-width="2"/>
  <line x1="22" y1="22" x2="32" y2="32" stroke="#f5c842" stroke-width="1" opacity="0.6"/>
  <line x1="1378" y1="22" x2="1335" y2="22" stroke="#00d4ff" stroke-width="2"/>
  <line x1="1378" y1="22" x2="1378" y2="65" stroke="#00d4ff" stroke-width="2"/>
  <line x1="1378" y1="22" x2="1368" y2="32" stroke="#f5c842" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="478" x2="65" y2="478" stroke="#00d4ff" stroke-width="2"/>
  <line x1="22" y1="478" x2="22" y2="435" stroke="#00d4ff" stroke-width="2"/>
  <line x1="1378" y1="478" x2="1335" y2="478" stroke="#00d4ff" stroke-width="2"/>
  <line x1="1378" y1="478" x2="1378" y2="435" stroke="#00d4ff" stroke-width="2"/>
</g>

<!-- ══════════ LEFT: CEL PIPELINE ══════════ -->
<g transform="translate(50, 52)">
