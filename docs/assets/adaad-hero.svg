  <g font-family="'Courier New',monospace">
    <!-- 01 -->
    <circle cx="12" cy="36" r="5.5" fill="#00d4ff" filter="url(#gs)">
      <animate attributeName="opacity" values="0.9;0.35;0.9" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="31" fill="#5ab8d8" font-size="9.5" letter-spacing="0.8">01</text>
    <text x="30" y="43" fill="#3d8aaa" font-size="9.5" letter-spacing="0.5">DRIFT CHECK</text>

