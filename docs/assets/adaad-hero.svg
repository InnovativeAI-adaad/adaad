      <animate attributeName="opacity" values="0.7;0.28;0.7" dur="3.5s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="271" fill="#5ab8d8" font-size="9.5" letter-spacing="0.8">06</text>
    <text x="30" y="283" fill="#3d8aaa" font-size="9.5" letter-spacing="0.5">SANDBOX EXECUTE</text>

    <!-- 07 GOLD -->
    <circle cx="12" cy="324" r="6.5" fill="#f5c842" filter="url(#gs)">
      <animate attributeName="opacity" values="0.9;0.38;0.9" dur="2.4s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="319" fill="#f5c842" font-size="9.5" letter-spacing="0.8">07</text>
    <text x="30" y="331" fill="#d4a030" font-size="9.5" letter-spacing="0.5" font-weight="bold">REPLAY VERIFY</text>

    <!-- 08-14 condensed -->
    <circle cx="12" cy="360" r="5" fill="#00d4ff" opacity="0.6"/>
    <text x="30" y="356" fill="#3d7a8a" font-size="9.5">08  FITNESS SCORE</text>
    <circle cx="12" cy="380" r="6" fill="#f5c842" opacity="0.85" filter="url(#gs)"/>
    <text x="30" y="376" fill="#c49020" font-size="9.5" font-weight="bold">09  GOVERNANCE GATE V2</text>
    <circle cx="12" cy="400" r="6" fill="#f5c842" opacity="0.8" filter="url(#gs)"/>
    <text x="30" y="396" fill="#c49020" font-size="9.5" font-weight="bold">10  GOVERNANCE GATE</text>
    <circle cx="12" cy="420" r="5" fill="#00d4ff" opacity="0.6"/>
    <text x="30" y="416" fill="#3d7a8a" font-size="9.5">11  LINEAGE REGISTER</text>
    <circle cx="12" cy="440" r="6" fill="#f5c842" opacity="0.8" filter="url(#gs)"/>
    <text x="30" y="436" fill="#c49020" font-size="9.5" font-weight="bold">12  PROMOTION DECISION</text>

    <!-- 14 GREEN BEACON -->
