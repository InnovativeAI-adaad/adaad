    <text x="30" y="127" fill="#5ab8d8" font-size="9.5" letter-spacing="0.8">03</text>
    <text x="30" y="139" fill="#3d8aaa" font-size="9.5" letter-spacing="0.5">FITNESS BASELINE</text>

    <!-- 04 GOLD -->
    <circle cx="12" cy="180" r="6.5" fill="#f5c842" filter="url(#gs)">
      <animate attributeName="opacity" values="0.95;0.42;0.95" dur="2.1s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="175" fill="#f5c842" font-size="9.5" letter-spacing="0.8">04</text>
    <text x="30" y="187" fill="#d4a030" font-size="9.5" letter-spacing="0.5" font-weight="bold">PROPOSAL GENERATE</text>

    <!-- 05 -->
