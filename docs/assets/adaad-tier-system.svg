<svg viewBox="0 0 1440 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010204"/>
    <stop offset="50%" stop-color="#030c18"/>
    <stop offset="100%" stop-color="#010204"/>
  </linearGradient>
  <pattern id="tdots" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="9" cy="9" r="0.75" fill="#00d4ff" opacity="0.12"/>
  </pattern>
  <filter id="tg">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1440" height="180" fill="url(#tbg)"/>
<rect width="1440" height="180" fill="url(#tdots)"/>
<rect x="0" y="0" width="1440" height="1.5" fill="#00d4ff" opacity="0.25"/>
<rect x="0" y="178.5" width="1440" height="1.5" fill="#00d4ff" opacity="0.15"/>

