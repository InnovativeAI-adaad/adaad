<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 28" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @keyframes flow{0%{stroke-dashoffset:80}100%{stroke-dashoffset:0}}
      @keyframes flow2{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
      @keyframes glow{0%,100%{opacity:.4}50%{opacity:.9}}
      .fl1{stroke:#3b82f6;stroke-width:1;fill:none;stroke-dasharray:8 6;animation:flow 3s linear infinite;opacity:.5}
      .fl2{stroke:#8b5cf6;stroke-width:.8;fill:none;stroke-dasharray:5 8;animation:flow2 4s linear infinite reverse;opacity:.4}
      .fl3{stroke:#f97316;stroke-width:.6;fill:none;stroke-dasharray:4 10;animation:flow 5s linear infinite;opacity:.3}
      .node{animation:glow 3s ease-in-out infinite}
    </style>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b0c0f" stop-opacity="1"/>
      <stop offset="10%" stop-color="#2b2f36" stop-opacity=".8"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity=".6"/>
      <stop offset="90%" stop-color="#2b2f36" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#0b0c0f" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="28" fill="#0b0c0f"/>
  <!-- Main center line -->
  <line x1="0" y1="14" x2="1200" y2="14" stroke="url(#dg)" stroke-width="1"/>
  <!-- Animated flow lines -->
  <line x1="0" y1="10" x2="1200" y2="10" class="fl1"/>
  <line x1="0" y1="14" x2="1200" y2="14" class="fl2"/>
  <line x1="0" y1="18" x2="1200" y2="18" class="fl3"/>
  <!-- Midpoint node -->
  <circle cx="600" cy="14" r="4" fill="#16181d" stroke="#3b82f6" stroke-width="1" class="node"/>
  <circle cx="600" cy="14" r="2" fill="#3b82f6" class="node"/>
  <!-- Quarter nodes -->
  <circle cx="300" cy="14" r="2.5" fill="#16181d" stroke="#8b5cf6" stroke-width=".8" class="node"/>
  <circle cx="900" cy="14" r="2.5" fill="#16181d" stroke="#f97316" stroke-width=".8" class="node"/>
  <!-- End caps -->
  <circle cx="20"   cy="14" r="1.5" fill="#2b2f36"/>
  <circle cx="1180" cy="14" r="1.5" fill="#2b2f36"/>
</svg>
