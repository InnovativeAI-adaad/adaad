<svg viewBox="0 0 1440 48" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="dl" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010204" stop-opacity="1"/>
    <stop offset="18%" stop-color="#00d4ff" stop-opacity="0.5"/>
    <stop offset="48%" stop-color="#f5c842" stop-opacity="0.6"/>
    <stop offset="52%" stop-color="#f5c842" stop-opacity="0.6"/>
    <stop offset="82%" stop-color="#00d4ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#010204" stop-opacity="1"/>
  </linearGradient>
  <linearGradient id="dl2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#010204" stop-opacity="1"/>
    <stop offset="25%" stop-color="#00d4ff" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.35"/>
    <stop offset="75%" stop-color="#00d4ff" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#010204" stop-opacity="1"/>
  </linearGradient>
  <filter id="gd">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1440" height="48" fill="#010204"/>
<rect x="0" y="23" width="1440" height="1" fill="url(#dl2)"/>
<rect x="0" y="22" width="1440" height="0.5" fill="url(#dl)"/>
<rect x="0" y="25" width="1440" height="0.5" fill="url(#dl)" opacity="0.4"/>
<!-- Center ornament -->
<polygon points="720,12 732,24 720,36 708,24" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.8" filter="url(#gd)"/>
<polygon points="720,16 730,24 720,32 710,24" fill="#f5c842" opacity="0.5"/>
<!-- Small flanking diamonds -->
<polygon points="620,20 626,24 620,28 614,24" fill="#00d4ff" opacity="0.3"/>
<polygon points="820,20 826,24 820,28 814,24" fill="#00d4ff" opacity="0.3"/>
<!-- Tick marks -->
<line x1="560" y1="20" x2="560" y2="28" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
<line x1="880" y1="20" x2="880" y2="28" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
<line x1="440" y1="22" x2="440" y2="26" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
<line x1="1000" y1="22" x2="1000" y2="26" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
</svg>
