# SPDX-License-Identifier: Apache-2.0
# Phase 78 M78-02 — Autonomous Doc Sync
# DOC-SYNC-VERSION-0: README version infobox matches VERSION file on every push to main
# DOC-SYNC-NO-BYPASS-0: no manual doc patches accepted; all version drift is CI-corrected

name: docs-autosync

on:
  push:
    branches: [main]
    paths:
      - VERSION
      - CHANGELOG.md
      - ROADMAP.md

permissions:
  contents: write

jobs:
  sync:
    name: Sync README version markers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Update README infobox
        run: |
          python3 - << 'PYEOF'
          import re, pathlib, subprocess, datetime

          version = pathlib.Path("VERSION").read_text().strip()
          readme_path = pathlib.Path("README.md")
          readme = readme_path.read_text()

          # Update version badge
          readme = re.sub(
              r"(ADAAD-v)[0-9]+\.[0-9]+\.[0-9]+(-000\?style=for-the-badge)",
              rf"\g<1>{version}\2",
              readme
          )

          # Update PyPI badge
          readme = re.sub(
              r"(PyPI-adaad_)[0-9]+\.[0-9]+\.[0-9]+(-000\?style=for-the-badge)",
              rf"\g<1>{version}\2",
              readme
          )

          # Update infobox version row
          readme = re.sub(
              r"(\| \*\*Version\*\* \| `)([0-9]+\.[0-9]+\.[0-9]+)(` \|)",
              rf"\g<1>{version}\g<3>",
              readme
          )

          # Update infobox Released row
          today = datetime.date.today().isoformat()
          readme = re.sub(
              r"(\| \*\*Released\*\* \| )[0-9]{4}-[0-9]{2}-[0-9]{2}( \|)",
              rf"\g<1>{today}\g<2>",
              readme
          )

          readme_path.write_text(readme)
          print(f"README updated to v{version}")
          PYEOF

      - name: Verify sync
        run: python3 scripts/verify_doc_sync.py

      - name: Commit if changed
        run: |
          git config user.name  "InnovativeAI"
          git config user.email "weirdo@innovativeai.llc"
          if git diff --quiet README.md; then
            echo "No README changes — already in sync"
          else
            git add README.md
            git commit -m "docs(autosync): README v${{ steps.ver.outputs.version }} [skip ci]"
            git push
          fi
