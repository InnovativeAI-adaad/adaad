{
  "policy_version": "0.7.0",
  "version": "0.7.0",
  "tiers": {
    "PRODUCTION": 0,
    "STABLE": 1,
    "SANDBOX": 2
  },
  "severities": [
    "blocking",
    "warning",
    "advisory"
  ],
  "immutability_constraints": {
    "frozen_top_level_keys": [
      "tiers",
      "severities",
      "immutability_constraints.required_rule_keys"
    ],
    "required_rule_keys": [
      "name",
      "enabled",
      "severity",
      "tier_overrides",
      "reason",
      "validator"
    ]
  },
  "rules": [
    {
      "name": "single_file_scope",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {
        "SANDBOX": "warning"
      },
      "reason": "Android memory constraints; reduces blast radius",
      "validator": "single_file_scope"
    },
    {
      "name": "ast_validity",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {},
      "reason": "Prevent syntax errors from breaking runtime",
      "validator": "ast_validity"
    },
    {
      "name": "import_smoke_test",
      "enabled": true,
      "severity": "warning",
      "tier_overrides": {
        "PRODUCTION": "blocking"
      },
      "reason": "Catch import errors before execution",
      "validator": "import_smoke_test"
    },
    {
      "name": "no_banned_tokens",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {},
      "reason": "Security: block eval, exec, os.system",
      "validator": "no_banned_tokens"
    },
    {
      "name": "signature_required",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {
        "SANDBOX": "warning"
      },
      "reason": "Cryptographic lineage enforcement",
      "validator": "signature_required"
    },
    {
      "name": "max_complexity_delta",
      "enabled": true,
      "severity": "warning",
      "tier_overrides": {},
      "reason": "Prevent complexity explosions",
      "validator": "max_complexity_delta"
    },
    {
      "name": "test_coverage_maintained",
      "enabled": true,
      "severity": "warning",
      "tier_overrides": {},
      "reason": "Ensure mutations don't reduce test coverage",
      "validator": "test_coverage_maintained"
    },
    {
      "name": "max_mutation_rate",
      "enabled": true,
      "severity": "warning",
      "tier_overrides": {
        "PRODUCTION": "blocking",
        "SANDBOX": "advisory"
      },
      "reason": "Prevent runaway mutation loops",
      "validator": "max_mutation_rate"
    },
    {
      "name": "lineage_continuity",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {},
      "reason": "Every mutation must trace to certified ancestor",
      "validator": "lineage_continuity"
    },
    {
      "name": "resource_bounds",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {},
      "reason": "Mutation cannot exceed memory/CPU/time budgets",
      "validator": "resource_bounds"
    },
    {
      "name": "entropy_budget_limit",
      "enabled": true,
      "severity": "warning",
      "tier_overrides": {
        "PRODUCTION": "blocking"
      },
      "reason": "Prevent entropy budget overruns per mutation",
      "validator": "entropy_budget_limit"
    },
    {
      "name": "deployment_authority_tier",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Surface deployment authority context for audit and review workflows",
      "validator": "deployment_authority_tier"
    },
    {
      "name": "revenue_credit_floor",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Track revenue-credit floor posture without gating mutation execution",
      "validator": "revenue_credit_floor"
    },
    {
      "name": "reviewer_calibration",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Expose reviewer calibration context as governance telemetry",
      "validator": "reviewer_calibration"
    },
    {
      "name": "governance_health_floor",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Surfaces GovernanceHealthAggregator h < 0.60 as a governance telemetry signal. When ADAAD_SEVERITY_ESCALATIONS promotes to blocking, a degraded health score halts new amendment proposals until floor is restored. GovernanceGate retains sole mutation approval authority; health score is advisory input only.",
      "validator": "governance_health_floor",
      "signals": [
        "avg_reviewer_reputation",
        "amendment_gate_pass_rate",
        "federation_divergence_clean",
        "epoch_health_score"
      ],
      "degraded_threshold": 0.6,
      "phase": 8
    },
    {
      "name": "soulbound_privacy_invariant",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {},
      "reason": "Phase 9 (Constitution v0.5.0): ContextReplayInterface must propagate ONLY context_digest and aggregate statistics from the SoulboundLedger into the AIMutationProposer proposal layer. Raw ledger payload content must never reach proposal agents. When blocking, any mutation proposal cycle that bypasses context_digest propagation is halted. GovernanceGate retains sole mutation approval authority; this rule enforces the soulbound privacy channel.",
      "validator": "soulbound_privacy_invariant",
      "invariants": [
        "replay_uses_digest_only",
        "raw_payload_propagation_blocked",
        "soulbound_key_configured"
      ],
      "phase": 9
    },
    {
      "name": "bandit_arm_integrity_invariant",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {
        "SANDBOX": "warning"
      },
      "reason": "Phase 11-A (Constitution v0.6.0): AgentBanditSelector arm statistics must remain non-negative (reward_mass >= 0, loss_mass >= 0, pull_count >= 0). No single agent may be recommended for more than MAX_CONSECUTIVE_BANDIT_EPOCHS consecutive epochs without at least one competing agent being recommended in that window. Prevents bandit lock-in from suppressing agent diversity and ensures the reward-learning loop cannot starve undersampled agents indefinitely. GovernanceGate retains sole mutation approval authority; this rule audits bandit state integrity.",
      "validator": "bandit_arm_integrity_invariant",
      "invariants": [
        "arm_stats_non_negative",
        "consecutive_epoch_cap_respected",
        "agent_diversity_maintained"
      ],
      "phase": 11,
      "max_consecutive_epochs": 10,
      "env_override": "ADAAD_BANDIT_MAX_CONSECUTIVE_EPOCHS"
    },
    {
      "name": "market_signal_integrity_invariant",
      "enabled": true,
      "severity": "blocking",
      "tier_overrides": {
        "SANDBOX": "warning"
      },
      "reason": "Phase 13 (Constitution v0.7.0): When MarketFitnessIntegrator.integrate() returns is_synthetic=True for more than MAX_SYNTHETIC_EPOCHS consecutive epochs, block weight adaptation promotion. A degraded or absent market feed silently corrupts fitness scoring across indefinite epochs without this guard. MAX_SYNTHETIC_EPOCHS defaults to 5 and is operator-configurable via ADAAD_MARKET_MAX_SYNTHETIC_EPOCHS. Reset path: operator calls reset_synthetic_counter() or provides a live feed reading. GovernanceGate retains sole mutation approval authority; this rule audits market signal health only.",
      "validator": "market_signal_integrity_invariant",
      "invariants": [
        "consecutive_synthetic_cap_respected",
        "weight_promotion_blocked_on_degraded_feed"
      ],
      "phase": 13,
      "max_synthetic_epochs": 5,
      "env_override": "ADAAD_MARKET_MAX_SYNTHETIC_EPOCHS"
    },
    {
      "name": "phase63_ast_safe_scaffold",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Phase 63 scaffold for AST-SAFE-0. Advisory-only until HUMAN-0 sign-off is recorded; pre-amendment enforcement remains non-blocking.",
      "validator": "phase63_ast_safe_scaffold"
    },
    {
      "name": "phase63_ast_import_scaffold",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Phase 63 scaffold for AST-IMPORT-0. Advisory-only until HUMAN-0 sign-off is recorded; pre-amendment enforcement remains non-blocking.",
      "validator": "phase63_ast_import_scaffold"
    },
    {
      "name": "phase63_ast_complexity_scaffold",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Phase 63 scaffold for AST-COMPLEX-0. Advisory-only until HUMAN-0 sign-off is recorded; pre-amendment enforcement remains non-blocking.",
      "validator": "phase63_ast_complexity_scaffold"
    },
    {
      "name": "phase63_semantic_integrity_scaffold",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Phase 63 scaffold for SEMANTIC-INT-0. Advisory-only until HUMAN-0 sign-off is recorded; pre-amendment enforcement remains non-blocking.",
      "validator": "phase63_semantic_integrity_scaffold"
    },
    {
      "name": "phase63_exception_scope_scaffold",
      "enabled": true,
      "severity": "advisory",
      "tier_overrides": {},
      "reason": "Phase 63 scaffold for EXCEP-SCOPE-0. Advisory-only until HUMAN-0 sign-off is recorded; pre-amendment enforcement remains non-blocking.",
      "validator": "phase63_exception_scope_scaffold"
    }
  ],
  "resource_bounds_policy": {
    "policy_version": "1.0.0",
    "limits": {
      "memory_mb": 2048,
      "cpu_seconds": 30,
      "wall_seconds": 60
    },
    "allow_env_overrides": [
      "memory_mb",
      "cpu_seconds",
      "wall_seconds"
    ],
    "strict_telemetry_tiers": [
      "PRODUCTION"
    ]
  }
}
